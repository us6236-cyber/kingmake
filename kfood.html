<meta charset="UTF-8" />

<title>K-FOOD | KING MAKE</title>

<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);

    --gold:#D4AF37;
    --premium:#ff3b3b;
    --standard:#ffffff;
  }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:var(--bg);
    color:#fff;
  }

  /* TOP BAR */
  .top{
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.78);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1800px;       /* ✅ 더 넓게 */
    margin:auto;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
  }
  .brand img{height:26px;width:auto;display:block;}
  .brand b{letter-spacing:1px}
  .page-title{
    font-size:13px;
    opacity:0.75;
  }

  /* LAYOUT */
  .wrap{
    max-width:1800px;       /* ✅ 더 넓게 */
    margin:0 auto;
    padding:26px 18px 70px;
    text-align:center;
  }
  .hero h1{
    margin:0;
    font-size:34px;
    letter-spacing:-0.5px;
  }
  .hero p{
    margin:12px 0 0;
    opacity:0.7;
    line-height:1.6;
  }

  /* LEGEND */
  .legend{
    margin:18px auto 0;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    opacity:0.9;
  }
  .pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.04);
  }
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.king{background:var(--gold)}
  .dot.premium{background:var(--premium)}
  .dot.standard{background:var(--standard)}
  .dot.hot{background:var(--premium)}

  /* HEATMAP */
  .heatmap{
    margin:26px auto 0;
    max-width:1740px;       /* ✅ 더 넓게 */
    border:1px solid var(--line);
    border-radius:18px;
    background:var(--panel);
    box-shadow:0 24px 80px rgba(0,0,0,0.65);
    overflow:hidden;
  }
  .grid{
    display:grid;
    gap:10px;
    padding:16px;
    grid-template-columns: repeat(22, 1fr); /* ✅ 더 넓게 */
    grid-auto-rows: 56px;
  }

  /* TILE */
  .tile{
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
    padding:12px;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
    user-select:none;
  }
  .tile:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.07);
  }

  .tile.king{ border-color:rgba(212,175,55,0.55); }
  .tile.premium{ border-color:rgba(255,59,59,0.55); }
  .tile.standard{ border-color:rgba(255,255,255,0.30); }

  /* HOT BLINK */
  .tile.hot{ animation:blinkHot 1.2s infinite; }
  @keyframes blinkHot{
    0%   { box-shadow:0 0 0 rgba(255,59,59,0); }
    50%  { box-shadow:0 0 18px rgba(255,59,59,0.85); border-color:rgba(255,59,59,0.9); }
    100% { box-shadow:0 0 0 rgba(255,59,59,0); }
  }

  /* LABEL */
  .badge{
    position:absolute;
    top:10px; left:10px;
    font-size:11px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.35);
    opacity:0.92;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .badge .mini-dot{width:8px;height:8px;border-radius:3px;display:inline-block;background:rgba(255,255,255,0.4);}
  .badge.king{border-color:rgba(212,175,55,0.55)}
  .badge.king .mini-dot{background:var(--gold)}
  .badge.premium{border-color:rgba(255,59,59,0.55)}
  .badge.premium .mini-dot{background:var(--premium)}
  .badge.standard{border-color:rgba(255,255,255,0.25)}
  .badge.standard .mini-dot{background:var(--standard)}
  .badge.hot .mini-dot{background:var(--premium)}

  .name{font-weight:800; letter-spacing:0.2px; line-height:1.1; text-align:left;}
  .sub{margin-top:6px; font-size:12px; color:rgba(255,255,255,0.7); text-align:left;}

  /* ✅ 좌석 크기: 등급별 “동일” */
  .kingSize{ grid-column: span 7; grid-row: span 2; }  /* KING 3석 동일 */
  .premSize{ grid-column: span 3; grid-row: span 2; }  /* Premium 47석 동일 */
  .stdSize{  grid-column: span 2; grid-row: span 1; }  /* Standard 50석 동일 */

  /* MOBILE */
  @media (max-width:1200px){
    .grid{ grid-template-columns: repeat(14, 1fr); }
    .kingSize{ grid-column: span 14; grid-row: span 2; }
    .premSize{ grid-column: span 7; grid-row: span 2; }
    .stdSize{  grid-column: span 7; grid-row: span 1; }
  }
  @media (max-width:520px){
    .grid{ grid-template-columns: repeat(6, 1fr); gap:8px; padding:12px; grid-auto-rows:52px; }
    .kingSize{ grid-column: span 6; grid-row: span 2; }
    .premSize{ grid-column: span 3; grid-row: span 2; }
    .stdSize{  grid-column: span 3; grid-row: span 1; }
  }
</style>

  { cat:"중식", name:"탕화쿵푸마라탕", url:"https://www.tanghuokungfu.co.kr/" },
  { cat:"중식", name:"라화쿵부마라탕", url:"https://www.lahuo.co.kr/" }
];

// 안전장치: 정확히 100개인지 확인
if (brands100.length !== 100){
  console.warn("브랜드 개수가 100이 아닙니다:", brands100.length);
}

// -------------------------
// 2) 좌석(등급) 100개 만들고
//    브랜드 100개를 매칭
// -------------------------
let tiers = [];
for(let i=0;i<SEAT_COUNTS.king;i++) tiers.push("king");
for(let i=0;i<SEAT_COUNTS.premium;i++) tiers.push("premium");
for(let i=0;i<SEAT_COUNTS.standard;i++) tiers.push("standard");

// 셔플
function shuffle(arr){
  return arr.map(v => ({ v, r: Math.random() }))
            .sort((a,b) => a.r - b.r)
            .map(o => o.v);
}

// HOT 인덱스: king/premium 위주
function pickHotIndexes(items, hotCount){
  const candidates = [];
  items.forEach((b, i) => {
    if (b.tier === "premium" || b.tier === "king") candidates.push(i);
  });
  const shuffled = shuffle(candidates);
  return new Set(shuffled.slice(0, Math.min(hotCount, shuffled.length)));
}

// url 이동
function go(url){
  if(!url) return;
  if(url.startsWith("mailto:")) { window.location.href = url; return; }
  window.open(url, "_blank", "noopener,noreferrer");
}

// 라벨/사이즈
function labelFor(tier){
  if(tier === "king") return "👑 KING";
  if(tier === "premium") return "⭐ Premium";
  return "⬜ Standard";
}
function sizeClassFor(tier){
  if(tier === "king") return "kingSize";
  if(tier === "premium") return "premSize";
  return "stdSize";
}
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// 100개 좌석에 100개 브랜드를 매칭(랜덤)
const tierShuffled = shuffle(tiers);
const brandShuffled = shuffle(brands100);

const seats = tierShuffled.map((tier, idx) => {
  const b = brandShuffled[idx];
  return {
    tier,
    cat: b.cat,
    name: b.name,
    url: b.url
  };
});

// HOT 적용
const hotSet = pickHotIndexes(seats, HOT_COUNT);

// -------------------------
// 3) 렌더
// -------------------------
const grid = document.getElementById("grid");

seats.forEach((b, i) => {
  const label = labelFor(b.tier);
  const sizeCls = sizeClassFor(b.tier);
  const isHot = hotSet.has(i);

  const tile = document.createElement("div");
  tile.className = `tile ${b.tier} ${sizeCls}` + (isHot ? " hot" : "");
  tile.setAttribute("role", "button");
  tile.setAttribute("tabindex", "0");
  tile.setAttribute("aria-label", `${b.name} (${label})`);

  tile.innerHTML = `
    <div class="badge ${b.tier} ${isHot ? "hot" : ""}">
      <span class="mini-dot"></span>
      ${label}${isHot ? " • HOT" : ""}
    </div>
    <div>
      <div class="name">${escapeHtml(b.name)}</div>
      <div class="sub">${escapeHtml(b.cat)} · 클릭하여 이동</div>
    </div>
  `;

  tile.addEventListener("click", () => go(b.url));
  tile.addEventListener("keydown", (e) => {
    if(e.key === "Enter" || e.key === " ") go(b.url);
  });

  grid.appendChild(tile);
});
</script>
</body>
</html>
