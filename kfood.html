<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-FOOD | KING MAKE</title>
<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);
    --gold:#D4AF37;
    --premium:#ff3b3b;
    --standard:#ffffff;
    --muted:rgba(255,255,255,0.70);
    --live:#2ecc71;
    --reserved:#f39c12;
    --open:#8e8e93;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:#fff;
  }

  .top{
    position:sticky;
    top:0;
    z-index:20;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.78);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1800px;
    margin:auto;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
  }
  .brand img{
    height:26px;
    width:auto;
    display:block;
  }
  .brand b{letter-spacing:1px}
  .page-title{
    font-size:13px;
    opacity:0.75;
  }

  .wrap{
    max-width:1800px;
    margin:0 auto;
    padding:22px 18px 70px;
    text-align:center;
  }

  .hero h1{
    margin:0;
    font-size:34px;
    letter-spacing:-0.5px;
  }
  .hero p{
    margin:12px 0 0;
    opacity:0.7;
    line-height:1.6;
  }

  .controls{
    max-width:1740px;
    margin:18px auto 0;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(255,255,255,0.03);
  }
  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .chip{
    padding:9px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.04);
    color:#fff;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    transition:0.15s;
  }
  .chip:hover{
    transform:translateY(-1px);
    border-color:rgba(255,255,255,0.32);
  }
  .chip.active{
    border-color:rgba(255,59,59,0.55);
    box-shadow:0 0 18px rgba(255,59,59,0.18);
  }

  .search{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .search input{
    width:min(420px, 74vw);
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(0,0,0,0.35);
    color:#fff;
    outline:none;
    font-size:13px;
  }
  .search input:focus{
    border-color:rgba(255,255,255,0.35);
  }
  .btn{
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.05);
    color:#fff;
    cursor:pointer;
    font-size:13px;
  }
  .btn:hover{
    border-color:rgba(255,255,255,0.32);
  }
  .count{
    font-size:13px;
    opacity:0.75;
    margin-left:6px;
  }

  /* KING */
  .king-zone{
    max-width:1740px;
    margin:18px auto 0;
    border:1px solid rgba(212,175,55,0.35);
    border-radius:18px;
    background:rgba(212,175,55,0.06);
    box-shadow:0 24px 80px rgba(0,0,0,0.55);
    overflow:hidden;
    padding:14px;
    text-align:left;
  }
  .king-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:6px 4px 12px;
  }
  .king-title b{
    font-size:14px;
    letter-spacing:0.3px;
  }
  .king-title span{
    font-size:12px;
    color:var(--muted);
  }
  .king-grid{
    display:grid;
    gap:12px;
    grid-template-columns:repeat(5, 1fr);
  }
  @media (max-width:1200px){
    .king-zone{overflow-x:auto;}
    .king-grid{
      grid-auto-flow:column;
      grid-auto-columns:minmax(250px, 1fr);
      grid-template-columns:none;
      width:max-content;
      padding-bottom:6px;
    }
  }
  .king-seat{
    position:relative;
    border:1px solid rgba(212,175,55,0.40);
    background:rgba(255,255,255,0.06);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
    min-height:110px;
    display:flex;
    align-items:center;
    padding:16px;
    gap:14px;
  }
  .king-seat:hover{
    transform:translateY(-2px);
    border-color:rgba(212,175,55,0.75);
    background:rgba(255,255,255,0.08);
    box-shadow:0 0 22px rgba(212,175,55,0.25);
  }
  .king-badge{
    position:absolute;
    top:10px;
    left:10px;
    font-weight:900;
    font-size:12px;
    color:rgba(255,255,255,0.88);
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(212,175,55,0.40);
    background:rgba(0,0,0,0.30);
    backdrop-filter:blur(8px);
  }
  .king-logo{
    width:120px;
    height:70px;
    border-radius:14px;
    border:1px solid rgba(212,175,55,0.35);
    background:rgba(255,255,255,0.92);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex:0 0 auto;
  }
  .king-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
  }
  .king-name{
    font-weight:900;
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .king-desc{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .legend{
    margin:14px auto 0;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    opacity:0.9;
  }
  .pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.04);
  }
  .dot{
    width:10px;
    height:10px;
    border-radius:3px;
    display:inline-block;
  }
  .dot.king{background:var(--gold)}
  .dot.premium{background:var(--premium)}
  .dot.standard{background:var(--standard)}
  .dot.live{background:var(--live)}
  .dot.reserved{background:var(--reserved)}
  .dot.open{background:var(--open)}

  /* BOARD */
  .board-wrap{
    max-width:1740px;
    margin:18px auto 0;
    display:grid;
    gap:18px;
  }
  .seat-section{
    border:1px solid var(--line);
    border-radius:18px;
    background:var(--panel);
    box-shadow:0 24px 80px rgba(0,0,0,0.65);
    overflow:hidden;
    text-align:left;
  }
  .seat-section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:16px 18px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.02);
  }
  .seat-section-head b{
    font-size:15px;
    letter-spacing:0.3px;
  }
  .seat-section-head span{
    font-size:12px;
    color:var(--muted);
  }

  .premium-grid{
    display:grid;
    gap:12px;
    padding:16px;
    grid-template-columns:repeat(10, minmax(0, 1fr));
  }

  .standard-grid{
    display:grid;
    gap:6px;
    padding:12px;
    grid-template-columns:repeat(10, minmax(0, 1fr));
  }

  .tile{
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease,border-color .18s ease,background .18s ease,opacity .18s ease,filter .18s ease;
    user-select:none;
  }
  .tile:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.07);
  }
  .tile.premium{
    border-color:rgba(255,59,59,0.55);
    border-radius:16px;
  }
  .tile.standard{
    border-color:rgba(255,255,255,0.30);
    border-radius:10px;
  }
  .tile.filtered-out{
    opacity:0.18;
    filter:grayscale(1);
    pointer-events:none;
  }
  .tile.open-seat{
    background:rgba(255,255,255,0.02);
  }

  .premium-tile{
    min-height:112px;
  }
  .premium-tile .logo-only-box{
    padding:18px 8px 8px;
  }
  .premium-tile .logo-only-box img{
    width:80px;
    height:80px;
  }

  /* 스탠다드 50% 축소 */
  .standard-tile{
    min-height:55px;
  }
  .standard-tile .logo-only-box{
    padding:12px 4px 4px;
  }
  .standard-tile .logo-only-box img{
    width:36px;
    height:36px;
  }

  .seat-no{
    position:absolute;
    top:6px;
    left:6px;
    min-width:34px;
    padding:3px 6px;
    border-radius:999px;
    font-size:9px;
    font-weight:800;
    letter-spacing:0.3px;
    background:rgba(0,0,0,0.42);
    color:#fff;
    border:1px solid rgba(255,255,255,0.16);
    z-index:2;
  }

  .standard-tile .seat-no{
    top:4px;
    left:4px;
    min-width:28px;
    padding:2px 5px;
    font-size:8px;
  }

  .seat-status{
    position:absolute;
    right:6px;
    bottom:6px;
    min-width:62px;
    padding:4px 6px;
    border-radius:999px;
    font-size:9px;
    font-weight:800;
    text-align:center;
    letter-spacing:0.2px;
    z-index:2;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.16);

  }
  .seat-status.reserved{

  }
  .seat-status.open{
    color:#d1d1d6;
    border-color:rgba(142,142,147,0.45);
  }

  .standard-tile .seat-status{
    right:4px;
    bottom:4px;
    min-width:44px;
    padding:2px 5px;
    font-size:7px;
  }

  .logo-only-box{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .open-box{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    color:rgba(255,255,255,0.75);
    text-align:center;
    padding:10px 6px 6px;
  }
  .open-box strong{
    font-size:11px;
    letter-spacing:0.3px;
  }
  .open-box span{
    font-size:8px;
    color:var(--muted);
  }

  .standard-tile .open-box strong{
    font-size:8px;
  }
  .standard-tile .open-box span{
    font-size:6px;
  }

  @media (max-width:1200px){
    .premium-grid,
    .standard-grid{
      grid-template-columns:repeat(5, minmax(0, 1fr));
    }
  }
  @media (max-width:700px){
    .premium-grid,
    .standard-grid{
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }
  }
</style>
</head>

const reservedPremium = ["P07","P18","P29","P41","P50"];
const openPremium = ["P03","P10","P16","P22","P33","P44"];
const reservedStandard = ["S05","S17","S28","S39"];
const openStandard = ["S02","S11","S20","S31","S42","S49"];

function shuffle(arr){
  return arr.map(v => ({ v, r: Math.random() })).sort((a,b)=>a.r-b.r).map(o=>o.v);
}
function go(url){
  if(!url) return;
  window.open(url, "_blank", "noopener,noreferrer");
}
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function domainFromUrl(url){
  try{ return new URL(url).hostname.toLowerCase().replace(/^www\./,""); }
  catch(e){ return ""; }
}
function localLogo(domain){ return `logos/${domain}.png`; }
function autoLogo(domain){ return `https://logo.clearbit.com/${domain}`; }

function getSeatStatus(seatNo, tier){
  if (tier === "premium") {
    if (openPremium.includes(seatNo)) return "OPEN";
    if (reservedPremium.includes(seatNo)) return "RESERVED";
    return "LIVE";
  }
  if (openStandard.includes(seatNo)) return "OPEN";
  if (reservedStandard.includes(seatNo)) return "RESERVED";
  return "LIVE";
}

function trackClickViaImage(brand){
  try{
    const url = encodeURIComponent(brand.url);
    const name = encodeURIComponent(brand.name);
    const tier = encodeURIComponent(brand.tier || "");
    const ua = encodeURIComponent(navigator.userAgent.slice(0,120));
    const img = new Image();
    img.referrerPolicy = "no-referrer";
    img.src = `${API_URL}?action=track&url=${url}&name=${name}&tier=${tier}&ua=${ua}&t=${Date.now()}`;
  }catch(e){}
}

function fetchTopJSONP(){
  return new Promise((resolve) => {
    const cb = "__topcb_" + Math.random().toString(36).slice(2);
    window[cb] = (data) => {
      const top = (data && data.ok && Array.isArray(data.top)) ? data.top : [];
      resolve(top);
      delete window[cb];
      script.remove();
    };
    const script = document.createElement("script");
    script.onerror = () => {
      resolve([]);
      delete window[cb];
      script.remove();
    };
    script.src = `${API_URL}?action=top7d_jsonp&cb=${cb}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

const kingGrid = document.getElementById("kingGrid");
const kingMeta = document.getElementById("kingMeta");
const refreshKingBtn = document.getElementById("refreshKingBtn");

async function renderKingSeats(){
  kingGrid.innerHTML = "";
  kingMeta.textContent = "불러오는 중…";

  const top = await fetchTopJSONP();
  const byUrl = new Map(brands100.map(b => [b.url, b]));

  let list = top.map((x) => {
    const b = byUrl.get(x.url);
    return b ? { ...b, clicks: x.count } : { cat:"", name:(x.name||"TOP"), url:x.url, clicks:x.count };
  });

  if(list.length < 5){
    const used = new Set(list.map(b=>b.url));
    const pool = shuffle([...brands100]);
    for(const b of pool){
      if(list.length >= 5) break;
      if(used.has(b.url)) continue;
      list.push({ ...b, clicks: 0 });
      used.add(b.url);
    }
  }

  list.slice(0,5).forEach((b, idx)=>{
    const seatNo = idx + 1;
    const domain = domainFromUrl(b.url);
    const logoLocal = domain ? localLogo(domain) : "";
    const logoAuto  = domain ? autoLogo(domain)  : "";

    const seat = document.createElement("div");
    seat.className = "king-seat";
    seat.tabIndex = 0;
    seat.setAttribute("role","button");
    seat.innerHTML = `
      <div class="king-badge">👑 KING ${seatNo}</div>
      <div class="king-logo">
        <img src="${escapeHtml(logoLocal)}"
             alt="${escapeHtml(b.name)} 로고"
             onerror="this.onerror=null; this.src='${escapeHtml(logoAuto)}';">
      </div>
      <div class="king-meta">
        <div class="king-name">${escapeHtml(b.name)}</div>
        <div class="king-desc">최근 7일 클릭 TOP${seatNo} • ${b.clicks}회</div>
      </div>
    `;
    seat.addEventListener("click", ()=>go(b.url));
    seat.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" ") go(b.url); });
    kingGrid.appendChild(seat);
  });

  kingMeta.textContent = `업데이트: ${new Date().toLocaleString()}`;
}
refreshKingBtn.addEventListener("click", renderKingSeats);
renderKingSeats();

const premiumBrands = brands100.slice(0, 50);
const standardBrands = brands100.slice(50, 100);

const premiumSeats = premiumBrands.map((b, idx) => ({

  tier:"premium",
  seatNo:`P${String(idx + 1).padStart(2, "0")}`,
  status:getSeatStatus(`P${String(idx + 1).padStart(2, "0")}`, "premium"),
  domain:domainFromUrl(b.url)
}));

const standardSeats = standardBrands.map((b, idx) => ({
  ...b,
  tier:"standard",
  seatNo:`S${String(idx + 1).padStart(2, "0")}`,
  status:getSeatStatus(`S${String(idx + 1).padStart(2, "0")}`, "standard"),
  domain:domainFromUrl(b.url)

const premiumGrid = document.getElementById("premiumGrid");
const standardGrid = document.getElementById("standardGrid");
const countText = document.getElementById("countText");
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");
const chips = document.getElementById("chips");

let currentCat = "ALL";
let currentQuery = "";
const tileRefs = [];

function createTile(b){
  const sizeClass = b.tier === "premium" ? "premium-tile" : "standard-tile";
  const tile = document.createElement("div");
  tile.className = `tile ${b.tier} ${sizeClass}` + (b.status === "OPEN" ? " open-seat" : "");
  tile.dataset.cat = b.cat;
  tile.dataset.name = (b.name || "").toLowerCase();
  tile.dataset.status = b.status;

  const logoLocal = b.domain ? localLogo(b.domain) : "";
  const logoAuto  = b.domain ? autoLogo(b.domain)  : "";

  if (b.status === "OPEN") {
    tile.innerHTML = `
      <div class="seat-no">${escapeHtml(b.seatNo)}</div>
      <div class="open-box">
        <strong>OPEN</strong>
        <span>Advertise Here</span>
      </div>
      <div class="seat-status open">OPEN</div>
    `;
  } else {
    tile.innerHTML = `
      <div class="seat-no">${escapeHtml(b.seatNo)}</div>
      <div class="logo-only-box">
        <img src="${escapeHtml(logoLocal)}"
             alt="${escapeHtml(b.name)} 로고"
             onerror="this.onerror=null; this.src='${escapeHtml(logoAuto)}';">
      </div>
      <div class="seat-status ${b.status.toLowerCase()}">${escapeHtml(b.status)}</div>
    `;
  }

  const clickHandler = () => {
    if (b.status === "OPEN") {
      window.location.href = "advertise.html";
      return;
    }
    if (b.status === "RESERVED") {
      alert(`${b.seatNo} 좌석은 예약 진행중입니다.`);
      return;
    }
    trackClickViaImage(b);
    setTimeout(renderKingSeats, 400);
    go(b.url);
  };

  tile.addEventListener("click", clickHandler);
  tile.addEventListener("keydown", (e)=>{ if(e.key==="Enter" || e.key===" ") clickHandler(); });
  tile.tabIndex = 0;
  tile.setAttribute("role","button");

  tileRefs.push(tile);
  return tile;
}

premiumSeats.forEach(b => premiumGrid.appendChild(createTile(b)));
standardSeats.forEach(b => standardGrid.appendChild(createTile(b)));

function applyFilter(){
  const q = (currentQuery || "").trim().toLowerCase();
  let shown = 0;

  tileRefs.forEach(tile => {
    const catOk = (currentCat === "ALL") || (tile.dataset.cat === currentCat);
    const nameOk = !q || tile.dataset.name.includes(q);
    const ok = catOk && nameOk;
    tile.classList.toggle("filtered-out", !ok);
    if(ok) shown++;
  });

  countText.textContent = `표시 ${shown} / ${tileRefs.length}`;
}

chips.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if(!chip) return;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  currentCat = chip.dataset.cat || "ALL";
  applyFilter();
});

searchInput.addEventListener("input", () => {
  currentQuery = searchInput.value;
  applyFilter();
});

clearBtn.addEventListener("click", () => {
  currentCat = "ALL";
  currentQuery = "";
  searchInput.value = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  document.querySelector('.chip[data-cat="ALL"]').classList.add("active");
  applyFilter();
});

applyFilter();
