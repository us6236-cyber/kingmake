<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-FOOD | KING MAKE</title>

<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);
    --premium:#ff3b3b;
    --standard:#ffffff;
    --live:#2ecc71;
    --reserved:#f39c12;
    --open:#8e8e93;
  }

  body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
  }

  .wrap{
    max-width:1800px;
    margin:auto;
    padding:20px;
  }

  /* 섹션 */
  .section{
    margin-top:20px;
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
  }

  .section-head{
    padding:14px;
    background:rgba(255,255,255,0.05);
    font-weight:bold;
  }

  /* PREMIUM */
  .premium-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:14px;
    padding:16px;
  }

  .premium-tile{
    min-height:170px;
    border:1px solid var(--premium);
    border-radius:16px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .premium-tile img{
    width:120px;
    height:120px;
    object-fit:contain;
  }

  /* STANDARD (작게) */
  .standard-grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:8px;
    padding:14px;
  }

  .standard-tile{
    min-height:95px;
    border:1px solid var(--standard);
    border-radius:12px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .standard-tile img{
    width:70px;
    height:70px;
    object-fit:contain;
  }

  /* 공통 */
  .seat-no{
    position:absolute;
    top:6px;
    left:6px;
    font-size:10px;
    background:rgba(0,0,0,0.5);
    padding:3px 6px;
    border-radius:6px;
  }

  .status{
    position:absolute;
    bottom:6px;
    right:6px;
    font-size:10px;
  }

  .live{color:var(--live)}
  .reserved{color:var(--reserved)}
  .open{color:var(--open)}

  .open-box{
    text-align:center;
    font-size:11px;
    opacity:0.7;
  }

</style>
</head>

<body>
<div class="wrap">

  <!-- PREMIUM -->
  <div class="section">
    <div class="section-head">⭐ Premium Seats</div>
    <div class="premium-grid" id="premiumGrid"></div>
  </div>

  <!-- STANDARD -->
  <div class="section">
    <div class="section-head">⬜ Standard Seats</div>
    <div class="standard-grid" id="standardGrid"></div>
  </div>

</div>

<script>

const brands = [
  "bhc.co.kr","bbq.co.kr","kyochon.com","goobne.co.kr","nenechicken.com",
  "starbucks.co.kr","ediya.com","mega-mgccoffee.com","composecoffee.com","paikdabang.com",
  "mcdonalds.co.kr","burgerking.co.kr","kfckorea.com","subway.co.kr","lotteeatz.com",
  "yupdduk.com","sinjeon.co.kr","jawsfood.co.kr","youngdabang.com","myungranghotdog.com",
  "bonif.co.kr","bossam.co.kr","mrg.kr","nolboo.co.kr","chae-seon-dang.com",
  "theborn.co.kr","zzambbongjijon.com","mankanghong.co.kr","hongjajang.com","gyodongjjambbong.com"
];

function logo(domain){
  return `https://logo.clearbit.com/${domain}`;
}

/* 상태 랜덤 (테스트용) */
function getStatus(i){
  if(i % 7 === 0) return "OPEN";
  if(i % 5 === 0) return "RESERVED";
  return "LIVE";
}

function createTile(i, tier){

  const domain = brands[i % brands.length];
  const status = getStatus(i);

  const tile = document.createElement("div");

  tile.className = tier === "premium"
    ? "premium-tile"
    : "standard-tile";

  if(status === "OPEN"){
    tile.innerHTML = `
      <div class="seat-no">${tier[0].toUpperCase()}${i+1}</div>
      <div class="open-box">
        OPEN<br>Advertise
      </div>
      <div class="status open">OPEN</div>
    `;
  } else {
    tile.innerHTML = `
      <div class="seat-no">${tier[0].toUpperCase()}${i+1}</div>
      <img src="${logo(domain)}">
      <div class="status ${status.toLowerCase()}">${status}</div>
    `;
  }

  tile.onclick = () => {
    if(status === "OPEN"){
      location.href = "advertise.html";
    }else if(status === "RESERVED"){
      alert("예약 진행중 좌석입니다");
    }else{
      window.open("https://" + domain);
    }
  }

  return tile;
}

/* PREMIUM 50 */
for(let i=0;i<50;i++){
  document.getElementById("premiumGrid")
    .appendChild(createTile(i,"premium"));
}

/* STANDARD 50 */
for(let i=0;i<50;i++){
  document.getElementById("standardGrid")
    .appendChild(createTile(i,"standard"));
}

</script>
</body>
</html>
