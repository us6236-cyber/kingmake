<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KING MAKE | Ranking Board</title>
<style>
  :root{
    --bg:#02040a;
    --panel:rgba(255,255,255,0.06);
    --line:rgba(255,255,255,0.14);
    --text:#fff;
    --muted:rgba(255,255,255,0.70);
    --hot:#ff3b3b;
  }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 50% 20%, rgba(0,140,255,0.22), transparent 55%),
      radial-gradient(900px 500px at 20% 10%, rgba(0,255,200,0.10), transparent 55%),
      linear-gradient(180deg, #050b1a 0%, #02040a 55%, #000 100%);
  }
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:28px 16px 60px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:18px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-weight:800; letter-spacing:1px;
  }
  .brand img{height:26px; width:auto; display:block;}
  .subtitle{font-size:13px; color:var(--muted);}

  /* BOARD */
  .board{
    border:1px solid var(--line);
    border-radius:18px;
    background:rgba(255,255,255,0.03);
    box-shadow:0 30px 90px rgba(0,0,0,0.65);
    overflow:hidden;
    padding:16px;
  }

  .grid{
    display:grid;
    gap:14px;
    grid-template-columns: repeat(3, 1fr);
  }

  /* CARD BASE */
  .card{
    position:relative;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    min-height:96px;
    display:flex;
    align-items:center;
    padding:16px 16px;
    gap:14px;
  }
  .card:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.08);
  }

  .rank{
    position:absolute;
    top:10px; left:10px;
    font-weight:900;
    font-size:14px;
    color:rgba(255,255,255,0.85);
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(0,0,0,0.30);
    backdrop-filter: blur(8px);
  }

  .logoBox{
    width:88px;
    height:52px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(0,0,0,0.22);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex: 0 0 auto;
  }
  .logoBox img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:10px;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.45));
  }

  .meta{
    text-align:left;
    min-width:0;
  }
  .name{
    font-weight:900;
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .desc{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* #1 BIG */
  .card.top1{
    grid-column: 1 / -1;
    min-height:130px;
    padding:20px 20px;
  }
  .card.top1 .logoBox{ width:140px; height:78px; }
  .card.top1 .name{ font-size:28px; }
  .card.top1 .desc{ font-size:13px; }

  /* HOT BLINK */
  .card.hot{
    animation:hotBlink 1.2s infinite;
  }
  @keyframes hotBlink{
    0%   { box-shadow:0 0 0 rgba(255,59,59,0); }
    50%  { box-shadow:0 0 22px rgba(255,59,59,0.85); border-color:rgba(255,59,59,0.9); }
    100% { box-shadow:0 0 0 rgba(255,59,59,0); }
  }

  /* RESPONSIVE */
  @media (max-width:900px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width:560px){
    .grid{ grid-template-columns: 1fr; }
    .card.top1 .name{ font-size:22px; }
    .card.top1 .logoBox{ width:120px; height:70px; }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="images/logo.png" alt="KING MAKE" onerror="this.style.display='none'">
        <div>KING MAKE</div>
      </div>
      <div class="subtitle">K-FOOD • Weekly Ranking Ad Board</div>
    </div>

    <div class="board">
      <div class="grid" id="grid"></div>
    </div>
  </div>

<script>
/**
 * ✅ 운영 방식
 * - 아래 rankingData만 바꾸면 “이번주 TOP10” 자동 반영
 * - 로고: /logos/<domain>.png 있으면 그걸 우선 사용
 * - 없으면 clearbit 자동 로고 시도
 */
const rankingData = [
  // 1위 (크게)
  { rank:1, name:"농심", url:"https://www.nongshim.com/", hot:true, desc:"1위 스폰서 • 메인 노출" },

  // 2~10
  { rank:2, name:"오뚜기", url:"https://www.ottogi.co.kr/", hot:false, desc:"TOP 브랜드" },
  { rank:3, name:"CJ제일제당", url:"https://www.cj.co.kr/", hot:false, desc:"TOP 브랜드" },
  { rank:4, name:"BHC", url:"https://www.bhc.co.kr/", hot:true, desc:"HOT • 클릭 유도" },
  { rank:5, name:"풀무원", url:"https://www.pulmuone.co.kr/", hot:false, desc:"TOP 브랜드" },
  { rank:6, name:"오리온", url:"https://www.orionworld.com/", hot:false, desc:"TOP 브랜드" },
  { rank:7, name:"교촌치킨", url:"https://www.kyochon.com/", hot:true, desc:"HOT • 클릭 유도" },
  { rank:8, name:"빙그레", url:"https://www.bing.co.kr/", hot:false, desc:"TOP 브랜드" },
  { rank:9, name:"매일유업", url:"https://www.maeil.com/", hot:false, desc:"TOP 브랜드" },
  { rank:10, name:"롯데칠성음료", url:"https://company.lottechilsung.co.kr/", hot:false, desc:"TOP 브랜드" }
];

function domainFromUrl(url){
  try{
    const u = new URL(url);
    return u.hostname.toLowerCase().replace(/^www\./,'');
  }catch(e){ return ""; }
}
function localLogo(domain){ return `logos/${domain}.png`; }
function autoLogo(domain){ return `https://logo.clearbit.com/${domain}`; }

function go(url){
  window.open(url, "_blank", "noopener,noreferrer");
}

const grid = document.getElementById("grid");

rankingData.forEach(item => {
  const domain = domainFromUrl(item.url);
  const logoLocal = domain ? localLogo(domain) : "";
  const logoAuto  = domain ? autoLogo(domain)  : "";

  const card = document.createElement("div");
  card.className = "card" + (item.rank === 1 ? " top1" : "") + (item.hot ? " hot" : "");
  card.tabIndex = 0;
  card.setAttribute("role","button");
  card.setAttribute("aria-label", `${item.rank}위 ${item.name} 이동`);

  card.innerHTML = `
    <div class="rank">${item.rank}위</div>
    <div class="logoBox">
      <img src="${logoLocal}"
           alt="${item.name} 로고"
           onerror="this.onerror=null; this.src='${logoAuto}';">
    </div>
    <div class="meta">
      <div class="name">${escapeHtml(item.name)}</div>
      <div class="desc">${escapeHtml(item.desc || "TOP 브랜드")}</div>
    </div>
  `;

  card.addEventListener("click", ()=>go(item.url));
  card.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" || e.key === " ") go(item.url);
  });

  grid.appendChild(card);
});

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>
</body>
</html>
