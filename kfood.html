<title>K-FOOD | KING MAKE</title>

<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);
    --gold:#D4AF37;
    --premium:#ff3b3b;
    --standard:#ffffff;
    --muted:rgba(255,255,255,0.70);
  }

  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;background:var(--bg);color:#fff;}

  .top{
    position:sticky; top:0; z-index:10;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.78);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1800px;margin:auto;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;}
  .brand img{height:26px;width:auto;display:block;}
  .brand b{letter-spacing:1px}
  .page-title{font-size:13px;opacity:0.75;}

  .wrap{max-width:1800px;margin:0 auto;padding:22px 18px 70px;text-align:center;}
  .hero h1{margin:0;font-size:34px;letter-spacing:-0.5px;}
  .hero p{margin:12px 0 0;opacity:0.7;line-height:1.6;}

  .controls{
    max-width:1740px;margin:18px auto 0;
    display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;
    padding:10px 12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,0.03);
  }
  .chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{
    padding:9px 12px;border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.04);
    color:#fff;font-size:13px;cursor:pointer;user-select:none;transition:0.15s;
  }
  .chip:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.32);}
  .chip.active{border-color:rgba(255,59,59,0.55);box-shadow:0 0 18px rgba(255,59,59,0.18);}

  .search{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .search input{
    width:min(420px, 74vw);padding:10px 12px;border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(0,0,0,0.35);color:#fff;outline:none;font-size:13px;
  }
  .search input:focus{border-color:rgba(255,255,255,0.35);}
  .btn{
    padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;font-size:13px;
  }
  .btn:hover{border-color:rgba(255,255,255,0.32);}
  .count{font-size:13px;opacity:0.75;margin-left:6px;}

  /* KING ZONE */
  .king-zone{
    max-width:1740px;margin:18px auto 0;
    border:1px solid rgba(212,175,55,0.35);
    border-radius:18px;background:rgba(212,175,55,0.06);
    box-shadow:0 24px 80px rgba(0,0,0,0.55);
    overflow:hidden;padding:14px;text-align:left;
  }
  .king-title{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 4px 12px;}
  .king-title b{font-size:14px;letter-spacing:0.3px;}
  .king-title span{font-size:12px;color:var(--muted);}

  .king-grid{display:grid;gap:12px;grid-template-columns:repeat(3, 1fr);}
  @media (max-width:900px){
    .king-zone{overflow-x:auto;}
    .king-grid{
      grid-auto-flow:column;grid-auto-columns:minmax(260px, 1fr);
      grid-template-columns:none;width:max-content;padding-bottom:6px;
    }
  }
  .king-seat{
    position:relative;border:1px solid rgba(212,175,55,0.40);
    background:rgba(255,255,255,0.06);
    border-radius:14px;overflow:hidden;cursor:pointer;
    transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
    min-height:110px;display:flex;align-items:center;padding:16px;gap:14px;
  }
  .king-seat:hover{
    transform:translateY(-2px);border-color:rgba(212,175,55,0.75);
    background:rgba(255,255,255,0.08);box-shadow:0 0 22px rgba(212,175,55,0.25);
  }
  .king-badge{
    position:absolute;top:10px;left:10px;font-weight:900;font-size:12px;color:rgba(255,255,255,0.88);
    padding:6px 10px;border-radius:999px;border:1px solid rgba(212,175,55,0.40);
    background:rgba(0,0,0,0.30);backdrop-filter:blur(8px);
  }
  .king-logo{
    width:140px;height:78px;border-radius:14px;border:1px solid rgba(212,175,55,0.35);
    background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex:0 0 auto;
  }
  .king-logo img{width:100%;height:100%;object-fit:contain;padding:14px;}
  .king-name{font-weight:900;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .king-desc{margin-top:6px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .legend{
    margin:14px auto 0;
    display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
    font-size:13px;opacity:0.9;
  }
  .pill{
    display:flex;align-items:center;gap:8px;
    padding:8px 10px;border:1px solid var(--line);
    border-radius:999px;background:rgba(255,255,255,0.04);
  }
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.king{background:var(--gold)}
  .dot.premium{background:var(--premium)}
  .dot.standard{background:var(--standard)}
  .dot.hot{background:var(--premium)}

  .heatmap{
    margin:18px auto 0;max-width:1740px;
    border:1px solid var(--line);
    border-radius:18px;background:var(--panel);
    box-shadow:0 24px 80px rgba(0,0,0,0.65);
    overflow:hidden;
  }
  .grid{
    display:grid;gap:10px;padding:16px;
    grid-template-columns:repeat(22, 1fr);
    grid-auto-rows:56px;
  }

  .tile{
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;background:rgba(255,255,255,0.04);
    cursor:pointer;position:relative;overflow:hidden;
    display:flex;align-items:flex-end;justify-content:flex-start;
    padding:12px;
    transition:transform .18s ease,border-color .18s ease,background .18s ease,opacity .18s ease,filter .18s ease;
    user-select:none;
  }
  .tile:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.07);}
  .tile.premium{border-color:rgba(255,59,59,0.55);}
  .tile.standard{border-color:rgba(255,255,255,0.30);}

  .tile.hot{animation:blinkHot 1.2s infinite;}
  @keyframes blinkHot{
    0%{box-shadow:0 0 0 rgba(255,59,59,0);}
    50%{box-shadow:0 0 18px rgba(255,59,59,0.85);border-color:rgba(255,59,59,0.9);}
    100%{box-shadow:0 0 0 rgba(255,59,59,0);}
  }
  .tile.filtered-out{opacity:0.18;filter:grayscale(1);pointer-events:none;}

  .badge{
    position:absolute;top:10px;left:10px;font-size:11px;padding:6px 10px;
    border-radius:999px;border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.35);opacity:0.92;
    display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .badge .mini-dot{width:8px;height:8px;border-radius:3px;display:inline-block;background:rgba(255,255,255,0.4);}
  .badge.premium{border-color:rgba(255,59,59,0.55)}
  .badge.premium .mini-dot{background:var(--premium)}
  .badge.standard{border-color:rgba(255,255,255,0.25)}
  .badge.standard .mini-dot{background:var(--standard)}
  .badge.hot .mini-dot{background:var(--premium)}

    position:absolute;top:10px;right:10px;
    width:34px;height:34px;border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.35);
    display:flex;align-items:center;justify-content:center;overflow:hidden;

    width:100%;height:100%;
    object-fit:contain;padding:6px;

  .name{font-weight:800;letter-spacing:0.2px;line-height:1.1;text-align:left;}
  .sub{margin-top:6px;font-size:12px;color:rgba(255,255,255,0.7);text-align:left;}

  .premSize{grid-column:span 3;grid-row:span 2;}
  .stdSize{grid-column:span 2;grid-row:span 1;}

  @media (max-width:1200px){
    .grid{grid-template-columns:repeat(14, 1fr);}
    .premSize{grid-column:span 7;grid-row:span 2;}
    .stdSize{grid-column:span 7;grid-row:span 1;}
  }
  @media (max-width:520px){
    .grid{grid-template-columns:repeat(6, 1fr);gap:8px;padding:12px;grid-auto-rows:52px;}
    .premSize{grid-column:span 3;grid-row:span 2;}
    .stdSize{grid-column:span 3;grid-row:span 1;}

/* -------------------------
  유틸
------------------------- */
function shuffle(arr){
  return arr.map(v => ({ v, r: Math.random() })).sort((a,b)=>a.r-b.r).map(o=>o.v);
}
function go(url){
  if(!url) return;
  window.open(url, "_blank", "noopener,noreferrer");
}
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function domainFromUrl(url){
  try{ return new URL(url).hostname.toLowerCase().replace(/^www\./,""); }catch(e){ return ""; }
}
function localLogo(domain){ return `logos/${domain}.png`; }
function autoLogo(domain){ return `https://logo.clearbit.com/${domain}`; }

/* -------------------------
  ✅ CORS-FREE 클릭 기록: Image Beacon (GET)
------------------------- */
function recordClickServer(brand){
  try{
    const ua = encodeURIComponent(navigator.userAgent.slice(0,120));
    const url = encodeURIComponent(brand.url);
    const name = encodeURIComponent(brand.name);
    const tier = encodeURIComponent(brand.tier || "");

    const img = new Image();
    img.referrerPolicy = "no-referrer";
    img.src = `${API_URL}?action=track&url=${url}&name=${name}&tier=${tier}&ua=${ua}&t=${Date.now()}`;
    img.onload = () => {};
    img.onerror = () => {};
  }catch(e){}
}

/* -------------------------
  ✅ CORS-FREE TOP3: JSONP
------------------------- */
function fetchTop3FromServerJSONP(){
  return new Promise((resolve) => {
    const cbName = "__kingTopCb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");

    window[cbName] = (data) => {
      try{
        resolve((data && data.ok && Array.isArray(data.top)) ? data.top : []);
      } finally {
        delete window[cbName];
        script.remove();
      }
    };

    script.onerror = () => {
      delete window[cbName];
      script.remove();
      resolve([]);
    };

    script.src = `${API_URL}?action=top7d_jsonp&cb=${cbName}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

/* -------------------------
  KING SEAT 렌더
------------------------- */
const kingGrid = document.getElementById("kingGrid");
const kingMeta = document.getElementById("kingMeta");
const refreshKingBtn = document.getElementById("refreshKingBtn");

async function renderKingSeats(){
  kingGrid.innerHTML = "";
  kingMeta.textContent = "불러오는 중…";

  const top = await fetchTop3FromServerJSONP(); // [{url,name,count}]
  const byUrl = new Map(brands100.map(b => [b.url, b]));

  let list = top.map((x) => {
    const b = byUrl.get(x.url);
    return b ? { ...b, clicks: x.count } : { cat:"", name:(x.name||"TOP"), url:x.url, tier:"", clicks:x.count };
  });

  // 부족하면 랜덤 채움
  if(list.length < 3){
    const used = new Set(list.map(b=>b.url));
    const pool = shuffle([...brands100]);
    for(const b of pool){
      if(list.length >= 3) break;
      if(used.has(b.url)) continue;
      list.push({ ...b, clicks: 0 });
      used.add(b.url);
    }
  }

  list.slice(0,3).forEach((b, idx)=>{
    const seatNo = idx + 1;
    const domain = domainFromUrl(b.url);
    const logoLocal = domain ? localLogo(domain) : "";
    const logoAuto  = domain ? autoLogo(domain)  : "";

    const seat = document.createElement("div");
    seat.className = "king-seat";
    seat.tabIndex = 0;
    seat.setAttribute("role","button");

    seat.innerHTML = `
      <div class="king-badge">👑 KING ${seatNo}</div>
      <div class="king-logo">
        <img src="${escapeHtml(logoLocal)}"
             alt="${escapeHtml(b.name)} 로고"
             onerror="this.onerror=null; this.src='${escapeHtml(logoAuto)}';">
      </div>
      <div class="king-meta">
        <div class="king-name">${escapeHtml(b.name)}</div>
        <div class="king-desc">최근 7일 클릭 TOP${seatNo} • ${b.clicks}회</div>
      </div>
    `;

    seat.addEventListener("click", ()=>go(b.url));
    seat.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" ") go(b.url); });

    kingGrid.appendChild(seat);
  });

  kingMeta.textContent = `업데이트: ${new Date().toLocaleString()}`;
}

refreshKingBtn.addEventListener("click", renderKingSeats);
renderKingSeats();

/* -------------------------
  히트맵 (100좌석)
------------------------- */
let tiers = [];
for(let i=0;i<50;i++) tiers.push("premium");
for(let i=0;i<50;i++) tiers.push("standard");

const tierShuffled = shuffle(tiers);
const brandShuffled = shuffle(brands100);

const seats = tierShuffled.map((tier, idx) => {
  const b = brandShuffled[idx];
  return { ...b, tier, domain: domainFromUrl(b.url) };
});

function pickHotIndexes(items, hotCount){
  const candidates = [];
  items.forEach((b, i) => { if(b.tier === "premium") candidates.push(i); });
  return new Set(shuffle(candidates).slice(0, Math.min(hotCount, candidates.length)));
}
const hotSet = pickHotIndexes(seats, HOT_COUNT);

/* -------------------------
  타일 렌더
------------------------- */
const grid = document.getElementById("grid");
const countText = document.getElementById("countText");
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");
const chips = document.getElementById("chips");

let currentCat = "ALL";
let currentQuery = "";
const tileRefs = [];

function labelFor(tier){ return tier === "premium" ? "⭐ Premium" : "⬜ Standard"; }
function sizeClassFor(tier){ return tier === "premium" ? "premSize" : "stdSize"; }

seats.forEach((b, i) => {
  const isHot = hotSet.has(i);
  const tile = document.createElement("div");
  tile.className = `tile ${b.tier} ${sizeClassFor(b.tier)}` + (isHot ? " hot" : "");
  tile.dataset.cat = b.cat;
  tile.dataset.name = (b.name || "").toLowerCase();

  const logoLocal = b.domain ? localLogo(b.domain) : "";
  const logoAuto  = b.domain ? autoLogo(b.domain)  : "";

  tile.innerHTML = `
    <div class="badge ${b.tier} ${isHot ? "hot" : ""}">
      <span class="mini-dot"></span>
      ${labelFor(b.tier)}${isHot ? " • HOT" : ""}
    </div>

    <div class="logo-badge" title="${escapeHtml(b.domain || '')}">
      <img src="${escapeHtml(logoLocal)}"
           alt="${escapeHtml(b.name)} 로고"
           onerror="this.onerror=null; this.src='${escapeHtml(logoAuto)}';" />
    </div>

    <div>
      <div class="name">${escapeHtml(b.name)}</div>
      <div class="sub">${escapeHtml(b.cat)} · 클릭하여 이동</div>
    </div>
  `;

  const clickHandler = () => {
    recordClickServer(b); // ✅ 무조건 기록됨
    setTimeout(renderKingSeats, 300); // ✅ 약간 텀 주고 TOP3 재조회
    go(b.url);
  };

  tile.addEventListener("click", clickHandler);
  tile.tabIndex = 0;
  tile.setAttribute("role","button");

  grid.appendChild(tile);
  tileRefs.push(tile);
});

/* -------------------------
  필터/검색
------------------------- */
function applyFilter(){
  const q = (currentQuery || "").trim().toLowerCase();
  let shown = 0;
  tileRefs.forEach(tile => {
    const catOk = (currentCat === "ALL") || (tile.dataset.cat === currentCat);
    const nameOk = !q || tile.dataset.name.includes(q);
    const ok = catOk && nameOk;
    tile.classList.toggle("filtered-out", !ok);
    if(ok) shown++;
  });
  countText.textContent = `표시 ${shown} / ${tileRefs.length}`;
}

chips.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if(!chip) return;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  currentCat = chip.dataset.cat || "ALL";
  applyFilter();
});

searchInput.addEventListener("input", () => { currentQuery = searchInput.value; applyFilter(); });

clearBtn.addEventListener("click", () => {
  currentCat = "ALL"; currentQuery = "";
  searchInput.value = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  document.querySelector('.chip[data-cat="ALL"]').classList.add("active");
  applyFilter();
});

applyFilter();
</script>
