<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-FOOD | KING MAKE</title>

<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);

    --gold:#D4AF37;
    --premium:#ff3b3b;
    --standard:#ffffff;
  }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:var(--bg);
    color:#fff;
  }

  /* TOP BAR */
  .top{
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.75);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1200px;
    margin:auto;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
  }
  .brand img{height:26px;width:auto;display:block;}
  .brand b{letter-spacing:1px}
  .page-title{
    font-size:13px;
    opacity:0.75;
  }

  /* LAYOUT */
  .wrap{
    max-width:1200px;
    margin:0 auto;
    padding:26px 18px 70px;
    text-align:center;
  }
  .hero h1{
    margin:0;
    font-size:34px;
    letter-spacing:-0.5px;
  }
  .hero p{
    margin:12px 0 0;
    opacity:0.7;
    line-height:1.6;
  }

  /* LEGEND */
  .legend{
    margin:18px auto 0;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    opacity:0.9;
  }
  .pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.04);
  }
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.king{background:var(--gold)}
  .dot.premium{background:var(--premium)}
  .dot.standard{background:var(--standard)}
  .dot.hot{background:var(--premium)}

  /* HEATMAP */
  .heatmap{
    margin:26px auto 0;
    max-width:1050px;
    border:1px solid var(--line);
    border-radius:18px;
    background:var(--panel);
    box-shadow:0 24px 80px rgba(0,0,0,0.65);
    overflow:hidden;
  }
  .grid{
    display:grid;
    gap:8px;
    padding:14px;
    grid-template-columns: repeat(12, 1fr);
    grid-auto-rows: 54px;
  }

  /* TILE */
  .tile{
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
    padding:12px;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
    user-select:none;
  }
  .tile:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.07);
  }

  /* TYPE BORDERS */
  .tile.king{ border-color:rgba(212,175,55,0.55); }
  .tile.premium{ border-color:rgba(255,59,59,0.55); }
  .tile.standard{ border-color:rgba(255,255,255,0.30); }

  /* HOT BLINK */
  .tile.hot{
    animation:blinkHot 1.2s infinite;
  }
  @keyframes blinkHot{
    0%   { box-shadow:0 0 0 rgba(255,59,59,0); }
    50%  { box-shadow:0 0 18px rgba(255,59,59,0.85); border-color:rgba(255,59,59,0.9); }
    100% { box-shadow:0 0 0 rgba(255,59,59,0); }
  }

  /* LABEL */
  .badge{
    position:absolute;
    top:10px; left:10px;
    font-size:11px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.35);
    opacity:0.92;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .badge.king{border-color:rgba(212,175,55,0.55)}
  .badge.premium{border-color:rgba(255,59,59,0.55)}
  .badge.standard{border-color:rgba(255,255,255,0.25)}
  .badge .mini-dot{width:8px;height:8px;border-radius:3px;display:inline-block;background:rgba(255,255,255,0.4);}
  .badge.king .mini-dot{background:var(--gold)}
  .badge.premium .mini-dot{background:var(--premium)}
  .badge.standard .mini-dot{background:var(--standard)}
  .badge.hot .mini-dot{background:var(--premium)}

  /* TEXT */
  .name{
    font-weight:800;
    letter-spacing:0.2px;
    line-height:1.1;
    text-align:left;
  }
  .sub{
    margin-top:6px;
    font-size:12px;
    color:rgba(255,255,255,0.7);
    text-align:left;
  }

  /* SIZES (treemap 느낌) */
  .w6{ grid-column: span 6; }
  .w5{ grid-column: span 5; }
  .w4{ grid-column: span 4; }
  .w3{ grid-column: span 3; }
  .w2{ grid-column: span 2; }
  .w1{ grid-column: span 1; }

  .h3{ grid-row: span 3; }
  .h2{ grid-row: span 2; }
  .h1{ grid-row: span 1; }

  /* MOBILE */
  @media (max-width:820px){
    .hero h1{font-size:28px}
    .grid{grid-auto-rows:50px}
  }
  @media (max-width:520px){
    .grid{grid-template-columns: repeat(6, 1fr); gap:8px; padding:12px;}
    .w6{ grid-column: span 6; }
    .w5{ grid-column: span 6; }
    .w4{ grid-column: span 6; }
    .w3{ grid-column: span 3; }
    .w2{ grid-column: span 3; }
    .w1{ grid-column: span 2; } /* 모바일에서는 아주 작은 타일을 줄임 */
  }
</style>
</head>

<body>

<div class="top">
  <div class="top-inner">
    <a class="brand" href="index.html" aria-label="KING MAKE Home">
      <img src="images/logo.png" alt="KING MAKE" onerror="this.style.display='none'">
      <b>KING MAKE</b>
    </a>
    <div class="page-title">K-FOOD CATEGORY • HEATMAP</div>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <h1>🍗 K-FOOD Brand Heatmap</h1>
    <p>
      블록 크기 = 영향력(노출 영역) / 등급 = KING · Premium · Standard<br>
      좌석을 클릭하면 해당 브랜드 홈페이지로 이동합니다.
    </p>
  </div>

  <div class="legend">
    <div class="pill"><span class="dot king"></span> KING (3)</div>
    <div class="pill"><span class="dot premium"></span> Premium (47)</div>
    <div class="pill"><span class="dot standard"></span> Standard (50)</div>
    <div class="pill"><span class="dot hot"></span> HOT (반짝)</div>
  </div>

  <div class="heatmap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
/**
 * ✅ 사용 방법
 * 1) 아래 brands 배열에 실제 브랜드/URL 넣으면 됨
 * 2) hot: true 인 브랜드는 반짝 효과
 * 3) 좌석 수는 king=3, premium=47, standard=50 자동 생성
 *
 * 주의: 데모용 URL(검색/포털 등)로 채워져 있습니다.
 * 실제 영업 전에는 각 브랜드 공식 홈페이지 URL로 교체하세요.
 */

const seatCounts = { king: 3, premium: 47, standard: 50 };

// 데모용 브랜드 데이터(원하시면 여기 목록을 실제 치킨/푸드 브랜드로 교체해드릴게요)
const brands = [
  // KING 후보(예시)
  { name: "KING SEAT", url: "mailto:contact@kingmake.kr", hot: true },

  // Premium/Standard 예시(URL은 데모용)
  { name: "BHC", url: "https://www.bhc.co.kr", hot: true },
  { name: "BBQ", url: "https://www.bbq.co.kr", hot: true },
  { name: "교촌치킨", url: "https://www.kyochon.com", hot: false },
  { name: "굽네치킨", url: "https://www.goobne.co.kr", hot: false },
  { name: "네네치킨", url: "https://nenechicken.com", hot: false },
  { name: "푸라닭", url: "https://puradakchicken.com", hot: true },
  { name: "노랑통닭", url: "https://www.norangtongdak.co.kr", hot: false },
  { name: "처갓집양념치킨", url: "https://www.cheogajip.co.kr", hot: false },
  { name: "또래오래", url: "https://www.toreore.com", hot: false },
  { name: "멕시카나", url: "https://www.mexicana.co.kr", hot: false },
  { name: "호식이두마리치킨", url: "https://www.hosigi.co.kr", hot: false },
  { name: "페리카나", url: "https://www.pericana.co.kr", hot: false },

  // (필요하면 여기 계속 추가)
];

// HOT 좌석 개수(원하신대로 바꾸세요)
const HOT_COUNT = 12;

// 타일 크기 규칙(히트맵 느낌)
function getSize(type){
  if(type === "king") return "w6 h3"; // 1개가 매우 큼
  if(type === "premium"){
    const r = Math.random();
    if(r < 0.25) return "w4 h2";
    if(r < 0.70) return "w3 h2";
    return "w2 h2";
  }
  // standard
  const r = Math.random();
  if(r < 0.15) return "w3 h1";
  if(r < 0.55) return "w2 h1";
  return "w1 h1";
}

function labelFor(type){
  if(type === "king") return "👑 KING";
  if(type === "premium") return "⭐ Premium";
  return "⬜ Standard";
}

// 안전한 새창 이동 (원하면 location.href 로 바꿔도 됨)
function go(url){
  if(!url) return;
  // mailto는 새탭 없이 처리
  if(url.startsWith("mailto:")) { window.location.href = url; return; }
  window.open(url, "_blank", "noopener,noreferrer");
}

// --- 좌석 리스트 만들기 ---
let seats = [];
for(let i=0;i<seatCounts.king;i++) seats.push("king");
for(let i=0;i<seatCounts.premium;i++) seats.push("premium");
for(let i=0;i<seatCounts.standard;i++) seats.push("standard");

// 랜덤 섞기
seats.sort(() => Math.random() - 0.5);

// HOT 좌석 선정: 프리미엄 위주로 랜덤 지정 (최대 HOT_COUNT)
const hotIndexes = new Set();
let tries = 0;
while(hotIndexes.size < HOT_COUNT && tries < 5000){
  const idx = Math.floor(Math.random() * seats.length);
  // 프리미엄/킹 위주로 핫 만들기
  if(seats[idx] === "premium" || seats[idx] === "king") hotIndexes.add(idx);
  tries++;
}

// --- 타일 렌더 ---
const grid = document.getElementById("grid");

// 브랜드 데이터가 부족하면 자동으로 채움(데모용)
function getBrand(i, type){
  // king은 3개 모두 KING SEAT로 통일해도 되고, 다른 이름을 써도 됨
  if(type === "king"){
    // KING 3석을 서로 다르게 보이고 싶으면 여기만 바꾸면 됨
    return [
      {name:"KING SEAT A", url:"mailto:contact@kingmake.kr", hot:true},
      {name:"KING SEAT B", url:"mailto:contact@kingmake.kr", hot:true},
      {name:"KING SEAT C", url:"mailto:contact@kingmake.kr", hot:true},
    ][i % 3];
  }

  // premium/standard는 brands 배열에서 순환 사용
  const b = brands[(i % Math.max(brands.length,1))];
  // brands[0]이 KING SEAT이면 제외하고 돌리고 싶으면 아래처럼:
  const pool = brands.slice(1);
  const pick = pool.length ? pool[i % pool.length] : {name:"Available", url:"mailto:contact@kingmake.kr", hot:false};
  return pick;
}

seats.forEach((type, i) => {
  const size = getSize(type);
  const label = labelFor(type);

  const b = getBrand(i, type);
  const isHot = hotIndexes.has(i) || !!b.hot;

  const tile = document.createElement("div");
  tile.className = `tile ${type} ${size}` + (isHot ? " hot" : "");
  tile.setAttribute("role", "button");
  tile.setAttribute("tabindex", "0");
  tile.setAttribute("aria-label", `${b.name} (${label})`);

  tile.innerHTML = `
    <div class="badge ${type} ${isHot ? "hot" : ""}">
      <span class="mini-dot"></span>
      ${label}${isHot ? " • HOT" : ""}
    </div>
    <div>
      <div class="name">${escapeHtml(b.name)}</div>
      <div class="sub">${escapeHtml("클릭하여 홈페이지 이동")}</div>
    </div>
  `;

  tile.addEventListener("click", () => go(b.url));
  tile.addEventListener("keydown", (e) => {
    if(e.key === "Enter" || e.key === " ") go(b.url);
  });

  grid.appendChild(tile);
});

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
