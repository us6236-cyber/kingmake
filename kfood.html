<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-FOOD | KING MAKE</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

/* 상단 */
.top{
  padding:15px;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
}

/* 필터 */
.chips{
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.chip{
  padding:6px 12px;
  border:1px solid #444;
  border-radius:20px;
  cursor:pointer;
}
.chip.active{
  border-color:red;
}

/* 검색 */
.search{
  padding:10px;
}

/* KING */
.king{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:10px;
}
.king div{
  border:1px solid gold;
  padding:20px;
  text-align:center;
}

/* 좌석 */
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:10px;
  padding:10px;
}

.tile{
  border:1px solid #333;
  cursor:pointer;
  position:relative;
}

/* 크기 차이 */
.premium{ height:120px; border-color:red; }
.standard{ height:60px; }

.seat-no{
  position:absolute;
  top:5px;
  left:5px;
  font-size:10px;
}

.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
}
.logo img{
  max-width:80%;
  max-height:80%;
}

.open{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="top">
  <b>KING MAKE</b>
  <div>K-FOOD</div>
</div>

<!-- 카테고리 -->
<div class="chips">
  <span class="chip active" data-cat="ALL">전체</span>
  <span class="chip" data-cat="치킨">치킨</span>
  <span class="chip" data-cat="버거">버거</span>
  <span class="chip" data-cat="카페">카페</span>
  <span class="chip" data-cat="분식">분식</span>
  <span class="chip" data-cat="한식">한식</span>
  <span class="chip" data-cat="중식">중식</span>
</div>

<!-- 검색 -->
<div class="search">
  <input id="searchInput" placeholder="브랜드 검색">
</div>

<!-- KING -->
<div class="king">
  <div>👑 KING1</div>
  <div>👑 KING2</div>
  <div>👑 KING3</div>
  <div>👑 KING4</div>
  <div>👑 KING5</div>
</div>

<h3 style="padding-left:10px;">Premium 100</h3>
<div id="premiumGrid" class="grid"></div>

<h3 style="padding-left:10px;">Standard 100</h3>
<div id="standardGrid" class="grid"></div>

<script>

/* 광고 데이터 */
const liveAds = {
  "P001":{
    name:"BHC",
    category:"치킨",
    url:"https://www.bhc.co.kr/",
    logo:"logos/bhc.co.kr.png"
  }
};

/* 좌석 상태 */
const premiumLive=["P001"];
const premiumReserved=[];
const standardLive=[];
const standardReserved=[];

/* 생성 */
function createTile(seatNo,tier){
  let status="OPEN";
  if(tier==="premium"){
    if(premiumLive.includes(seatNo)) status="LIVE";
  }

  const tile=document.createElement("div");
  tile.className=`tile ${tier}`;
  tile.dataset.seat=seatNo.toLowerCase();

  const ad=liveAds[seatNo];
  const cat=ad?ad.category:"기타";

  tile.dataset.cat=cat;
  tile.dataset.name=(ad?.name||"").toLowerCase();

  if(status==="OPEN"){
    tile.innerHTML=`
      <div class="seat-no">${seatNo}</div>
      <div class="open">OPEN</div>
    `;
  }else{
    tile.innerHTML=`
      <div class="seat-no">${seatNo}</div>
      <div class="logo">
        <img src="${ad.logo}">
      </div>
    `;
  }

  tile.onclick=()=>{
    if(status==="OPEN"){
      location.href="advertise.html";
    }else{
      window.open(ad.url);
    }
  };

  return tile;
}

/* 렌더 */
const premiumGrid=document.getElementById("premiumGrid");
const standardGrid=document.getElementById("standardGrid");

for(let i=1;i<=100;i++){
  const num="P"+String(i).padStart(3,"0");
  premiumGrid.appendChild(createTile(num,"premium"));
}

for(let i=1;i<=100;i++){
  const num="S"+String(i).padStart(3,"0");
  standardGrid.appendChild(createTile(num,"standard"));
}

/* 필터 */
let currentCat="ALL";
let currentQuery="";

function applyFilter(){
  const q=currentQuery.toLowerCase();

  document.querySelectorAll(".tile").forEach(tile=>{
    const catOk=currentCat==="ALL"||tile.dataset.cat===currentCat;
    const nameOk=!q||tile.dataset.name.includes(q);
    tile.style.display=(catOk&&nameOk)?"":"none";
  });
}

/* 카테고리 */
document.querySelectorAll(".chip").forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active");
    currentCat=c.dataset.cat;
    applyFilter();
  };
});

/* 검색 */
searchInput.oninput=()=>{
  currentQuery=searchInput.value;
  applyFilter();
};

</script>

</body>
</html>
