<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-FOOD | KING MAKE</title>

<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);

    --gold:#D4AF37;
    --premium:#ff3b3b;
    --standard:#ffffff;
  }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:var(--bg);
    color:#fff;
  }

  /* TOP BAR */
  .top{
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.75);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1400px;          /* ✅ 화면 확장 */
    margin:auto;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
  }
  .brand img{height:26px;width:auto;display:block;}
  .brand b{letter-spacing:1px}
  .page-title{
    font-size:13px;
    opacity:0.75;
  }

  /* LAYOUT */
  .wrap{
    max-width:1400px;          /* ✅ 화면 확장 */
    margin:0 auto;
    padding:26px 18px 70px;
    text-align:center;
  }
  .hero h1{
    margin:0;
    font-size:34px;
    letter-spacing:-0.5px;
  }
  .hero p{
    margin:12px 0 0;
    opacity:0.7;
    line-height:1.6;
  }

  /* LEGEND */
  .legend{
    margin:18px auto 0;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    opacity:0.9;
  }
  .pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.04);
  }
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.king{background:var(--gold)}
  .dot.premium{background:var(--premium)}
  .dot.standard{background:var(--standard)}
  .dot.hot{background:var(--premium)}

  /* HEATMAP */
  .heatmap{
    margin:26px auto 0;
    max-width:1320px;          /* ✅ 화면 확장 */
    border:1px solid var(--line);
    border-radius:18px;
    background:var(--panel);
    box-shadow:0 24px 80px rgba(0,0,0,0.65);
    overflow:hidden;
  }

  /* ✅ 더 넓은 그리드 */
  .grid{
    display:grid;
    gap:10px;
    padding:16px;
    grid-template-columns: repeat(16, 1fr); /* ✅ 12 → 16 */
    grid-auto-rows: 56px;
  }

  /* TILE */
  .tile{
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
    padding:12px;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
    user-select:none;
  }
  .tile:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.07);
  }

  /* TYPE BORDERS */
  .tile.king{ border-color:rgba(212,175,55,0.55); }
  .tile.premium{ border-color:rgba(255,59,59,0.55); }
  .tile.standard{ border-color:rgba(255,255,255,0.30); }

  /* HOT BLINK */
  .tile.hot{
    animation:blinkHot 1.2s infinite;
  }
  @keyframes blinkHot{
    0%   { box-shadow:0 0 0 rgba(255,59,59,0); }
    50%  { box-shadow:0 0 18px rgba(255,59,59,0.85); border-color:rgba(255,59,59,0.9); }
    100% { box-shadow:0 0 0 rgba(255,59,59,0); }
  }

  /* LABEL */
  .badge{
    position:absolute;
    top:10px; left:10px;
    font-size:11px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.35);
    opacity:0.92;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .badge .mini-dot{width:8px;height:8px;border-radius:3px;display:inline-block;background:rgba(255,255,255,0.4);}
  .badge.king{border-color:rgba(212,175,55,0.55)}
  .badge.king .mini-dot{background:var(--gold)}
  .badge.premium{border-color:rgba(255,59,59,0.55)}
  .badge.premium .mini-dot{background:var(--premium)}
  .badge.standard{border-color:rgba(255,255,255,0.25)}
  .badge.standard .mini-dot{background:var(--standard)}
  .badge.hot .mini-dot{background:var(--premium)}

  /* TEXT */
  .name{
    font-weight:800;
    letter-spacing:0.2px;
    line-height:1.1;
    text-align:left;
  }
  .sub{
    margin-top:6px;
    font-size:12px;
    color:rgba(255,255,255,0.7);
    text-align:left;
  }

  /* ✅ 좌석 크기: 전부 동일하게 */
  .kingSize{ grid-column: span 4; grid-row: span 2; }     /* KING 3석 동일 */
  .premSize{ grid-column: span 2; grid-row: span 2; }     /* Premium 47석 동일 */
  .stdSize{  grid-column: span 2; grid-row: span 1; }     /* Standard 50석 동일 */

  /* MOBILE */
  @media (max-width:980px){
    .grid{ grid-template-columns: repeat(12, 1fr); grid-auto-rows:54px; }
    .kingSize{ grid-column: span 6; grid-row: span 2; }
    .premSize{ grid-column: span 3; grid-row: span 2; }
    .stdSize{  grid-column: span 3; grid-row: span 1; }
  }
  @media (max-width:520px){
    .grid{ grid-template-columns: repeat(6, 1fr); gap:8px; padding:12px; grid-auto-rows:52px; }
    .kingSize{ grid-column: span 6; grid-row: span 2; }
    .premSize{ grid-column: span 3; grid-row: span 2; }
    .stdSize{  grid-column: span 3; grid-row: span 1; }
  }
</style>
</head>

<body>

<div class="top">
  <div class="top-inner">
    <a class="brand" href="index.html" aria-label="KING MAKE Home">
      <img src="images/logo.png" alt="KING MAKE" onerror="this.style.display='none'">
      <b>KING MAKE</b>
    </a>
    <div class="page-title">K-FOOD CATEGORY • HEATMAP</div>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <h1>🍗 K-FOOD Brand Heatmap</h1>
    <p>
      블록 크기 = 영향력(노출 영역) / 등급 = KING · Premium · Standard<br>
      좌석을 클릭하면 해당 브랜드 페이지로 이동합니다.
    </p>
  </div>

  <div class="legend">
    <div class="pill"><span class="dot king"></span> KING (3)</div>
    <div class="pill"><span class="dot premium"></span> Premium (47)</div>
    <div class="pill"><span class="dot standard"></span> Standard (50)</div>
    <div class="pill"><span class="dot hot"></span> HOT (반짝)</div>
  </div>

  <div class="heatmap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
/**
 * ✅ 요구사항 반영
 * - 배열 100개(3+47+50) 깔끔하게 채움
 * - KING / Premium / Standard 각각 사이즈 동일
 * - 랜덤 배치 (셔플)
 * - 좌석 클릭 시 브랜드 홈페이지로 이동
 * - HOT 좌석 반짝 효과 적용
 *
 * ⚠️ URL은 “정확한 공식홈페이지” 검증을 위해 웹 검색이 필요합니다.
 * 여기서는 안전하게 '공식홈페이지 검색 링크'로 넣어두었습니다.
 * (원하시면: 브랜드별 공식 URL을 제가 웹으로 확인해서 정확히 채운 버전도 만들어드릴게요.)
 */

// 좌석 수
const SEAT_COUNTS = { king: 3, premium: 47, standard: 50 };

// HOT 좌석 개수(원하는 만큼 조절)
const HOT_COUNT = 12;

// 브랜드 리스트(총 100개)
// - KING 3개는 입점 문의(메일)로
// - Premium 47개 / Standard 50개는 브랜드명 기반 검색 링크로
const brands = [
  // 👑 KING (3)
  { tier:"king", name:"KING SEAT A", url:"mailto:contact@kingmake.kr" },
  { tier:"king", name:"KING SEAT B", url:"mailto:contact@kingmake.kr" },
  { tier:"king", name:"KING SEAT C", url:"mailto:contact@kingmake.kr" },

  // ⭐ Premium (47)
  ...[
    "BHC","BBQ","교촌치킨","굽네치킨","네네치킨","푸라닭","노랑통닭","처갓집양념치킨","또래오래","멕시카나",
    "페리카나","호식이두마리치킨","지코바","60계치킨","자담치킨","부어치킨","치킨플러스","바른치킨","또봉이통닭","땅땅치킨",
    "꾸브라꼬숯불두마리치킨","기영이숯불두마리치킨","치킨마루","쌀통닭","올리브치킨","와락치킨","킹콩부대찌개(치킨)","강정이기가막혀","코리엔탈치킨","치킨신드롬",
    "오븐에빠진닭(오빠닭)","훌랄라참숯바베큐치킨","누구나홀딱반한닭","치킨678","치킨매니아","또카닭","치킨더홈","대한통닭","한신포차(치킨)","꼬꼬닭",
    "치킨퐁","통큰치킨","자이언트치킨","치킨의민족","오성통닭","마니치킨","수원통닭거리(브랜드)"
  ].slice(0, SEAT_COUNTS.premium).map(n => ({
    tier:"premium",
    name:n,
    url: searchUrl(n)
  })),

  // ⬜ Standard (50)
  ...[
    "김밥천국","김가네","고봉민김밥","죠스떡볶이","엽기떡볶이","신전떡볶이","청년다방","응급실떡볶이","명랑핫도그","청년피자",
    "피자나라치킨공주","미스터피자","피자헛","도미노피자","파파존스","빽다방","이디야커피","메가MGC커피","컴포즈커피","탐앤탐스",
    "할리스","투썸플레이스","카페베네","맘스터치","롯데리아","버거킹","맥도날드","서브웨이","KFC","한솥도시락",
    "본죽","본죽&비빔밥","홍콩반점0410","새마을식당","백철판0410","역전우동0410","롤링파스타","인생설렁탕","연돈볼카츠","원조쌈밥집",
    "명륜진사갈비","이차돌","채선당","샤브올데이","놀부부대찌개","놀부보쌈","원할머니보쌈","족발야시장","미스터보쌈","청년족발"
  ].slice(0, SEAT_COUNTS.standard).map(n => ({
    tier:"standard",
    name:n,
    url: searchUrl(n)
  }))
].slice(0, 100);

// 검색 링크(안전) : 브랜드명 + 공식 홈페이지
function searchUrl(name){
  const q = encodeURIComponent(name + " 공식 홈페이지");
  return "https://www.google.com/search?q=" + q;
}

// 랜덤 셔플
function shuffle(arr){
  return arr.map(v => ({ v, r: Math.random() }))
            .sort((a,b) => a.r - b.r)
            .map(o => o.v);
}

// HOT 인덱스 선정: premium/king에서 우선 뽑기
function pickHotIndexes(items, hotCount){
  const candidates = [];
  items.forEach((b, i) => {
    if (b.tier === "premium" || b.tier === "king") candidates.push(i);
  });
  const shuffled = shuffle(candidates);
  return new Set(shuffled.slice(0, Math.min(hotCount, shuffled.length)));
}

// 이동(새탭)
function go(url){
  if(!url) return;
  if(url.startsWith("mailto:")) { window.location.href = url; return; }
  window.open(url, "_blank", "noopener,noreferrer");
}

// 라벨 & 사이즈 클래스
function labelFor(tier){
  if(tier === "king") return "👑 KING";
  if(tier === "premium") return "⭐ Premium";
  return "⬜ Standard";
}
function sizeClassFor(tier){
  if(tier === "king") return "kingSize";
  if(tier === "premium") return "premSize";
  return "stdSize";
}

// 렌더링
const grid = document.getElementById("grid");

// 랜덤 배치: brands 자체를 셔플
const items = shuffle(brands);

// HOT 적용
const hotSet = pickHotIndexes(items, HOT_COUNT);

items.forEach((b, i) => {
  const label = labelFor(b.tier);
  const sizeCls = sizeClassFor(b.tier);
  const isHot = hotSet.has(i);

  const tile = document.createElement("div");
  tile.className = `tile ${b.tier} ${sizeCls}` + (isHot ? " hot" : "");
  tile.setAttribute("role", "button");
  tile.setAttribute("tabindex", "0");
  tile.setAttribute("aria-label", `${b.name} (${label})`);

  tile.innerHTML = `
    <div class="badge ${b.tier} ${isHot ? "hot" : ""}">
      <span class="mini-dot"></span>
      ${label}${isHot ? " • HOT" : ""}
    </div>
    <div>
      <div class="name">${escapeHtml(b.name)}</div>
      <div class="sub">클릭하여 홈페이지 이동</div>
    </div>
  `;

  tile.addEventListener("click", () => go(b.url));
  tile.addEventListener("keydown", (e) => {
    if(e.key === "Enter" || e.key === " ") go(b.url);
  });

  grid.appendChild(tile);
});

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
