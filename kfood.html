<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-FOOD | KING MAKE</title>

<style>
  :root{
    --bg:#000;
    --panel:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.12);
    --gold:#D4AF37;
    --premium:#ff3b3b;
    --standard:#ffffff;
    --muted:rgba(255,255,255,0.70);
  }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:var(--bg);
    color:#fff;
  }

  /* TOP BAR */
  .top{
    position:sticky; top:0; z-index:10;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.78);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1800px;
    margin:auto;
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    text-decoration:none; color:#fff;
  }
  .brand img{height:26px;width:auto;display:block;}
  .brand b{letter-spacing:1px}
  .page-title{font-size:13px; opacity:0.75;}

  /* LAYOUT */
  .wrap{
    max-width:1800px;
    margin:0 auto;
    padding:22px 18px 70px;
    text-align:center;
  }
  .hero h1{margin:0; font-size:34px; letter-spacing:-0.5px;}
  .hero p{margin:12px 0 0; opacity:0.7; line-height:1.6;}

  /* CONTROLS */
  .controls{
    max-width:1740px;
    margin:18px auto 0;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(255,255,255,0.03);
  }

  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .chip{
    padding:9px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.04);
    color:#fff;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    transition:0.15s;
  }
  .chip:hover{ transform:translateY(-1px); border-color:rgba(255,255,255,0.32); }
  .chip.active{
    border-color:rgba(255,59,59,0.55);
    box-shadow:0 0 18px rgba(255,59,59,0.18);
  }

  .search{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .search input{
    width:min(420px, 74vw);
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(0,0,0,0.35);
    color:#fff;
    outline:none;
    font-size:13px;
  }
  .search input:focus{ border-color:rgba(255,255,255,0.35); }
  .btn{
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.05);
    color:#fff;
    cursor:pointer;
    font-size:13px;
  }
  .btn:hover{ border-color:rgba(255,255,255,0.32); }
  .count{
    font-size:13px;
    opacity:0.75;
    margin-left:6px;
  }

  /* LEGEND */
  .legend{
    margin:14px auto 0;
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    font-size:13px; opacity:0.9;
  }
  .pill{
    display:flex; align-items:center; gap:8px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.04);
  }
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.king{background:var(--gold)}
  .dot.premium{background:var(--premium)}
  .dot.standard{background:var(--standard)}
  .dot.hot{background:var(--premium)}

  /* ✅ TOP10 광고판(로고형) */
  .rank-board{
    max-width:1740px;
    margin:18px auto 0;
    border:1px solid var(--line);
    border-radius:18px;
    background:rgba(255,255,255,0.03);
    box-shadow:0 24px 80px rgba(0,0,0,0.55);
    overflow:hidden;
    padding:14px;
    text-align:left;
  }
  .rank-title{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    padding:6px 4px 12px;
  }
  .rank-title b{
    font-size:14px;
    letter-spacing:0.3px;
  }
  .rank-title span{
    font-size:12px;
    color:var(--muted);
  }

  .rank-grid{
    display:grid;
    gap:12px;
    grid-template-columns: repeat(3, 1fr);
  }

  .rank-card{
    position:relative;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    min-height:92px;
    display:flex;
    align-items:center;
    padding:14px 14px;
    gap:14px;
  }
  .rank-card:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.08);
  }
  .rank-card.top1{
    grid-column: 1 / -1;
    min-height:120px;
    padding:18px 18px;
  }

  .rank-badge{
    position:absolute;
    top:10px; left:10px;
    font-weight:900;
    font-size:13px;
    color:rgba(255,255,255,0.85);
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(0,0,0,0.30);
    backdrop-filter: blur(8px);
  }

  /* ✅ 로고 박스: 올려주신 광고판 느낌처럼 "가로 직사각 로고" */
  .rank-logo{
    width:120px;
    height:66px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.92); /* ✅ 흰 배경 */
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex:0 0 auto;
  }
  .rank-card.top1 .rank-logo{
    width:170px;
    height:88px;
    border-radius:14px;
  }

  .rank-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
    filter:none;
  }

  .rank-meta{
    min-width:0;
  }
  .rank-name{
    font-weight:900;
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .rank-card.top1 .rank-name{ font-size:26px; }

  .rank-desc{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .rank-card.hot{
    animation:hotBlink 1.2s infinite;
  }
  @keyframes hotBlink{
    0%   { box-shadow:0 0 0 rgba(255,59,59,0); }
    50%  { box-shadow:0 0 22px rgba(255,59,59,0.85); border-color:rgba(255,59,59,0.9); }
    100% { box-shadow:0 0 0 rgba(255,59,59,0); }
  }

  @media (max-width:900px){
    .rank-grid{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width:560px){
    .rank-grid{ grid-template-columns: 1fr; }
    .rank-card.top1 .rank-name{ font-size:22px; }
    .rank-logo{ width:112px; height:60px; }
    .rank-card.top1 .rank-logo{ width:150px; height:80px; }
  }

  /* HEATMAP */
  .heatmap{
    margin:18px auto 0;
    max-width:1740px;
    border:1px solid var(--line);
    border-radius:18px;
    background:var(--panel);
    box-shadow:0 24px 80px rgba(0,0,0,0.65);
    overflow:hidden;
  }
  .grid{
    display:grid;
    gap:10px;
    padding:16px;
    grid-template-columns: repeat(22, 1fr);
    grid-auto-rows: 56px;
  }

  .tile{
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
    padding:12px;
    transition:transform .18s ease, border-color .18s ease, background .18s ease, opacity .18s ease, filter .18s ease;
    user-select:none;
  }
  .tile:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.07);
  }

  .tile.king{ border-color:rgba(212,175,55,0.55); }
  .tile.premium{ border-color:rgba(255,59,59,0.55); }
  .tile.standard{ border-color:rgba(255,255,255,0.30); }

  .tile.hot{ animation:blinkHot 1.2s infinite; }
  @keyframes blinkHot{
    0%   { box-shadow:0 0 0 rgba(255,59,59,0); }
    50%  { box-shadow:0 0 18px rgba(255,59,59,0.85); border-color:rgba(255,59,59,0.9); }
    100% { box-shadow:0 0 0 rgba(255,59,59,0); }
  }

  .tile.filtered-out{
    opacity:0.18;
    filter:grayscale(1);
    pointer-events:none;
  }

  .badge{
    position:absolute;
    top:10px; left:10px;
    font-size:11px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.35);
    opacity:0.92;
    display:flex; align-items:center; gap:6px;
    white-space:nowrap;
  }
  .badge .mini-dot{width:8px;height:8px;border-radius:3px;display:inline-block;background:rgba(255,255,255,0.4);}
  .badge.king{border-color:rgba(212,175,55,0.55)}
  .badge.king .mini-dot{background:var(--gold)}
  .badge.premium{border-color:rgba(255,59,59,0.55)}
  .badge.premium .mini-dot{background:var(--premium)}
  .badge.standard{border-color:rgba(255,255,255,0.25)}
  .badge.standard .mini-dot{background:var(--standard)}
  .badge.hot .mini-dot{background:var(--premium)}

  /* 히트맵 로고 배지(오른쪽 상단) */
  .logo-badge{
    position:absolute;
    top:10px; right:10px;
    width:34px; height:34px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .logo-badge img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:6px;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55));
  }

  .name{font-weight:800; letter-spacing:0.2px; line-height:1.1; text-align:left;}
  .sub{margin-top:6px; font-size:12px; color:rgba(255,255,255,0.7); text-align:left;}

  .kingSize{ grid-column: span 7; grid-row: span 2; }
  .premSize{ grid-column: span 3; grid-row: span 2; }
  .stdSize{  grid-column: span 2; grid-row: span 1; }

  @media (max-width:1200px){
    .grid{ grid-template-columns: repeat(14, 1fr); }
    .kingSize{ grid-column: span 14; grid-row: span 2; }
    .premSize{ grid-column: span 7; grid-row: span 2; }
    .stdSize{  grid-column: span 7; grid-row: span 1; }
  }
  @media (max-width:520px){
    .grid{ grid-template-columns: repeat(6, 1fr); gap:8px; padding:12px; grid-auto-rows:52px; }
    .kingSize{ grid-column: span 6; grid-row: span 2; }
    .premSize{ grid-column: span 3; grid-row: span 2; }
    .stdSize{  grid-column: span 3; grid-row: span 1; }
  }
</style>
</head>

/* ---- 유틸 ---- */
function shuffle(arr){
  return arr.map(v => ({ v, r: Math.random() }))
            .sort((a,b) => a.r - b.r)
            .map(o => o.v);
}
function pickHotIndexes(items, hotCount){
  const candidates = [];
  items.forEach((b, i) => {
    if (b.tier === "premium" || b.tier === "king") candidates.push(i);
  });
  const shuffled = shuffle(candidates);
  return new Set(shuffled.slice(0, Math.min(hotCount, shuffled.length)));
}
function go(url){
  if(!url) return;
  window.open(url, "_blank", "noopener,noreferrer");
}
function labelFor(tier){
  if(tier === "king") return "👑 KING";
  if(tier === "premium") return "⭐ Premium";
  return "⬜ Standard";
}
function sizeClassFor(tier){
  if(tier === "king") return "kingSize";
  if(tier === "premium") return "premSize";
  return "stdSize";
}
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* 로고 자동 */
function domainFromUrl(url){
  try{
    const u = new URL(url);
    return u.hostname.toLowerCase().replace(/^www\./,"");
  }catch(e){ return ""; }
}
function localLogo(domain){ return `logos/${domain}.png`; }
function autoLogo(domain){ return `https://logo.clearbit.com/${domain}`; }

/* -------------------------
   A) TOP10 광고판 렌더 (로고형)
------------------------- */
const rankGrid = document.getElementById("rankGrid");

top10.forEach(item=>{
  const domain = domainFromUrl(item.url);
  const logoLocal = domain ? localLogo(domain) : "";
  const logoAuto  = domain ? autoLogo(domain)  : "";

  const card = document.createElement("div");
  card.className = "rank-card" + (item.rank===1 ? " top1":"") + (item.hot ? " hot":"");
  card.tabIndex = 0;
  card.setAttribute("role","button");
  card.setAttribute("aria-label", `${item.rank}위 ${item.name} 이동`);

  card.innerHTML = `
    <div class="rank-badge">${item.rank}위</div>
    <div class="rank-logo">
      <img src="${escapeHtml(logoLocal)}"
           alt="${escapeHtml(item.name)} 로고"
           onerror="this.onerror=null; this.src='${escapeHtml(logoAuto)}';">
    </div>
    <div class="rank-meta">
      <div class="rank-name">${escapeHtml(item.name)}</div>
      <div class="rank-desc">${escapeHtml(item.desc || "TOP 브랜드")}</div>
    </div>
  `;

  card.addEventListener("click", ()=>go(item.url));
  card.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" || e.key===" ") go(item.url);
  });

  rankGrid.appendChild(card);
});

/* -------------------------
   B) 히트맵(기존 유지)
------------------------- */
let tiers = [];
for(let i=0;i<SEAT_COUNTS.king;i++) tiers.push("king");
for(let i=0;i<SEAT_COUNTS.premium;i++) tiers.push("premium");
for(let i=0;i<SEAT_COUNTS.standard;i++) tiers.push("standard");

const tierShuffled = shuffle(tiers);
const brandShuffled = shuffle(brands100);

const seats = tierShuffled.map((tier, idx) => {
  const b = brandShuffled[idx];
  const domain = domainFromUrl(b.url);
  return { tier, cat:b.cat, name:b.name, url:b.url, domain };
});

const hotSet = pickHotIndexes(seats, HOT_COUNT);

const grid = document.getElementById("grid");
const countText = document.getElementById("countText");
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");
const chips = document.getElementById("chips");

let currentCat = "ALL";
let currentQuery = "";
const tileRefs = [];

seats.forEach((b, i) => {
  const label = labelFor(b.tier);
  const sizeCls = sizeClassFor(b.tier);
  const isHot = hotSet.has(i);

  const tile = document.createElement("div");
  tile.className = `tile ${b.tier} ${sizeCls}` + (isHot ? " hot" : "");
  tile.dataset.cat = b.cat;
  tile.dataset.name = b.name.toLowerCase();

  const logoLocal = b.domain ? localLogo(b.domain) : "";
  const logoAuto  = b.domain ? autoLogo(b.domain)  : "";

  tile.innerHTML = `
    <div class="badge ${b.tier} ${isHot ? "hot" : ""}">
      <span class="mini-dot"></span>
      ${label}${isHot ? " • HOT" : ""}
    </div>

    <div class="logo-badge" title="${escapeHtml(b.domain || '')}">
      <img
        src="${escapeHtml(logoLocal)}"
        alt="${escapeHtml(b.name)} 로고"
        onerror="this.onerror=null; this.src='${escapeHtml(logoAuto)}';"
      />
    </div>

    <div>
      <div class="name">${escapeHtml(b.name)}</div>
      <div class="sub">${escapeHtml(b.cat)} · 클릭하여 이동</div>
    </div>
  `;

  tile.addEventListener("click", () => go(b.url));
  tile.addEventListener("keydown", (e) => {
    if(e.key === "Enter" || e.key === " ") go(b.url);
  });
  tile.tabIndex = 0;
  tile.setAttribute("role","button");

  grid.appendChild(tile);
  tileRefs.push(tile);
});

function applyFilter(){
  const q = (currentQuery || "").trim().toLowerCase();
  let shown = 0;

  tileRefs.forEach(tile => {
    const catOk = (currentCat === "ALL") || (tile.dataset.cat === currentCat);
    const nameOk = !q || tile.dataset.name.includes(q);
    const ok = catOk && nameOk;

    tile.classList.toggle("filtered-out", !ok);
    if(ok) shown++;
  });

  countText.textContent = `표시 ${shown} / ${tileRefs.length}`;
}

chips.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if(!chip) return;

  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  chip.classList.add("active");

  currentCat = chip.dataset.cat || "ALL";
  applyFilter();
});

searchInput.addEventListener("input", () => {
  currentQuery = searchInput.value;
  applyFilter();
});

clearBtn.addEventListener("click", () => {
  currentCat = "ALL";
  currentQuery = "";
  searchInput.value = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  document.querySelector('.chip[data-cat="ALL"]').classList.add("active");
  applyFilter();
});

applyFilter();
</script>
