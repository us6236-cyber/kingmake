<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KING MAKE</title>

<!-- 파비콘(선택) -->
<!-- <link rel="icon" href="images/favicon.png"> -->

<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:#000;
    color:#fff;
    text-align:center;
    overflow-x:hidden;
  }

  /* NAV */
  .nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    z-index:1000;
  }
  .nav-inner{
    max-width:1200px;
    margin:auto;
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:12px;
  }

  /* LOGO (이미지) */
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
  }
  .brand img{
    height:32px;
    width:auto;
    display:block;
  }
  .brand .wordmark{
    font-weight:700;
    letter-spacing:1px;
    font-size:18px;
    line-height:1;
  }

  /* LAYOUT */
  .container{
    max-width:1200px;
    margin:auto;
    padding:120px 20px 70px;
  }

  /* HERO TEXT */
  .hero-title{
    font-size:44px;
    margin:0;
    letter-spacing:-0.5px;
  }
  .hero-sub{
    opacity:0.7;
    margin-top:12px;
    font-size:18px;
    line-height:1.6;
  }

  /* HERO IMAGE */
  .hero-image{
    margin-top:40px;
    display:flex;
    justify-content:center;
  }
  .hero-image img{
    width:100%;
    max-width:900px;
    border-radius:18px;
    box-shadow:0 24px 80px rgba(0,0,0,0.75);
    display:block;
  }

  /* CATEGORIES (BOTTOM) */
  .section{
    margin-top:80px;
  }
  .section-title{
    font-size:20px;
    margin:0 0 18px;
    opacity:0.85;
  }

  .categories{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:18px;
  }

  .cat{
    width:220px;
    height:140px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:20px;
    cursor:pointer;
    transition:0.25s;
    background:rgba(255,255,255,0.03);
    user-select:none;
  }

  .cat:hover{
    transform:translateY(-6px);
    border-color:#fff;
    background:rgba(255,255,255,0.08);
  }

  .cat span{
    font-size:34px;
    margin-bottom:8px;
  }

  /* FOOTER */
  footer{
    margin-top:80px;
    opacity:0.4;
    font-size:13px;
  }

  /* MOBILE */
  @media (max-width:768px){
    .container{padding:110px 16px 60px}
    .hero-title{font-size:34px}
    .hero-sub{font-size:16px}
    .cat{width:46vw; min-width:160px; height:120px; font-size:16px}
    .cat span{font-size:28px}
    .nav-inner{padding:12px 16px}
    .brand img{height:26px}
    .brand .wordmark{font-size:16px}
  }
</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">

    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="KING MAKE Logo">
      <span>KING MAKE</span>
    </a>

  </div>
</div>

<div class="container">

  <!-- HERO TEXT -->
  <h1 class="hero-title">The K-Brand Road Map</h1>
  <div class="hero-sub">
    대한민국 브랜드 경쟁이 시작되는 지도 플랫폼
  </div>

  <!-- HERO IMAGE (CENTER) -->
  <div class="hero-image">
    <!-- ✅ HERO 이미지 파일: /images/hero1.png -->
    <img src="images/hero1.png" alt="K-Brand Map Hero">
  </div>

  <!-- CATEGORIES (BOTTOM) -->
  <div class="section">
    <div class="section-title">카테고리 선택</div>

    <div class="categories">
      <div class="cat" onclick="location.href='kfood.html'">
        <span>🍗</span>
        K-FOOD
      </div>

      <div class="cat" onclick="alert('준비중')">
        <span>💄</span>
        K-BEAUTY
      </div>

      <div class="cat" onclick="alert('준비중')">
        <span>🎬</span>
        K-CULTURE
      </div>

      <div class="cat" onclick="alert('준비중')">
        <span>👕</span>
        K-FASHION
      </div>

      <div class="cat" onclick="alert('준비중')">
        <span>📱</span>
        K-TECH
      </div>
    </div>
  </div>

  <footer>© 2026 KING MAKE</footer>
</div>

</body>
</html>
