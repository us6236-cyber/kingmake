<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING MAKE</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:1000;
}
.nav-inner{
  max-width:1600px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
}
.logo{font-weight:700;letter-spacing:1px}
.menu a{
  margin-left:25px;
  text-decoration:none;
  color:#fff;
  opacity:0.8;
  font-size:14px;
}
.menu a:hover{opacity:1}

/* LANGUAGE */
.lang-toggle{
  margin-left:20px;
  cursor:pointer;
  opacity:0.6;
}
.lang-toggle:hover{opacity:1}

/* LAYOUT */
.container{
  max-width:1600px;
  margin:auto;
  padding:140px 60px 80px;
  text-align:center;
}

/* HERO */
.hero{
  animation:fadeUp 1.2s ease forwards;
}
.hero h1{
  font-size:64px;
  letter-spacing:-1.5px;
  margin:0;
}
.hero h2{
  font-weight:400;
  opacity:0.7;
  margin-top:20px;
  font-size:22px;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:translateY(0)}
}

.hero-buttons{margin-top:40px}

.btn{
  display:inline-block;
  margin:10px;
  padding:18px 46px;
  border-radius:40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.25s;
}
.btn:hover{
  background:#fff;
  color:#000;
}

/* MAP */
.map{
  position:relative;
}
.map img{
  width:100%;
  max-width:1400px;
  margin-top:70px;
  border-radius:18px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
}

/* KING SEAT NEON */
.king-glow{
  position:absolute;
  top:25%;
  left:47%;
  width:6%;
  height:6%;
  border-radius:50%;
  box-shadow:0 0 20px #ffd700,0 0 40px #ffd700;
  animation:pulse 1.8s infinite;
}
@keyframes pulse{
  0%{opacity:0.5}
  50%{opacity:1}
  100%{opacity:0.5}
}

/* SECTIONS */
.section{margin-top:140px}
.section h1{font-size:40px;margin-bottom:20px}
.highlight{font-size:22px;opacity:0.85;line-height:1.8}

/* CARDS */
.card-wrap{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:50px;
}
.card{
  border:1px solid rgba(255,255,255,0.15);
  padding:40px;
  border-radius:18px;
  width:300px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-6px);
  border-color:rgba(255,255,255,0.4);
}

/* LOGO SLIDER */
.logo-slider{
  margin-top:60px;
  overflow:hidden;
  white-space:nowrap;
}
.logo-track{
  display:inline-block;
  animation:scroll 18s linear infinite;
}
.logo-track img{
  height:40px;
  margin:0 30px;
  opacity:0.7;
}
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* FOOTER */
footer{
  margin-top:160px;
  text-align:center;
  opacity:0.4;
  font-size:13px;
}

/* MOBILE */
@media (max-width:768px){
  .menu{display:none}
  .container{padding:120px 20px 60px}
  .hero h1{font-size:38px}
  .hero h2{font-size:18px}
  .section h1{font-size:28px}
  .highlight{font-size:18px}
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">
    <div class="logo">KING MAKE</div>
    <div>
      <span class="lang-toggle" onclick="toggleLang()">EN</span>
    </div>
  </div>
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1 id="title">브랜드가 보이는 자리가,<br>매출이 됩니다.</h1>
    <h2 id="subtitle">대한민국 대표 브랜드를 위한 프리미엄 디지털 광고 지도</h2>

    <div class="hero-buttons">
      <a class="btn" href="#seats">Seats</a>
      <a class="btn" href="mailto:contact@kingmake.kr">Contact</a>
    </div>
  </div>

  <!-- MAP -->
  <div class="map">
    <img src="images/hero.png">
    <div class="king-glow"></div>
  </div>

  <!-- LOGO SLIDER -->
  <div class="logo-slider">
    <div class="logo-track">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/79/Starbucks_Logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/KFC_logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/McDonald%27s_Golden_Arches.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Burger_King_2020.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/79/Starbucks_Logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/KFC_logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/McDonald%27s_Golden_Arches.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Burger_King_2020.svg">
    </div>
  </div>

  <!-- SEATS -->
  <div class="section" id="seats">
    <h1>Seat Concept</h1>
    <div class="card-wrap">
      <div class="card">👑 KING SEAT<br>Exclusive Crown Position</div>
      <div class="card">⭐ Premium<br>High Visibility Placement</div>
      <div class="card">⬜ Standard<br>Category Participation</div>
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="section">
    <h1>K-FOOD</h1>
    <div class="highlight">
      Korea’s leading food brands,<br>
      mapped in one powerful digital space.
    </div>
  </div>

  <footer>© 2026 KING MAKE</footer>

</div>

<script>
function toggleLang(){
  const title=document.getElementById("title");
  const subtitle=document.getElementById("subtitle");

  if(title.innerHTML.includes("매출")){
    title.innerHTML="Where your brand appears,<br>sales begin.";
    subtitle.innerHTML="Premium digital map for Korea’s food brands";
  }else{
    title.innerHTML="브랜드가 보이는 자리가,<br>매출이 됩니다.";
    subtitle.innerHTML="대한민국 대표 브랜드를 위한 프리미엄 디지털 광고 지도";
  }
}
</script>

</body>
</html>
