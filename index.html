<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING MAKE</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#000;
color:#fff;
text-align:center;
}

.container{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo img{
height:36px;
}

.logo span{
font-size:24px;
font-weight:700;
letter-spacing:1px;
}

.hero-title{
font-size:56px;
font-weight:700;
letter-spacing:-1px;
margin:20px 0;
}

.sub{
font-size:20px;
opacity:0.7;
margin-bottom:40px;
}

.hero{
width:90%;
max-width:1200px;
margin:40px 0;
}

.hero img{
width:100%;
border-radius:14px;
box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.categories{
margin-top:60px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.cat{
padding:16px 36px;
border-radius:30px;
border:1px solid #fff;
text-decoration:none;
color:#fff;
font-size:18px;
transition:0.2s;
}

.cat:hover{
background:#fff;
color:#000;
}

.footer{
position:absolute;
bottom:20px;
font-size:12px;
opacity:0.4;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="images/logo.png">
<span>KING MAKE</span>

</div>

<h1 class="hero-title">
K-BRAND ROADMAP
</h1>

<div class="sub">
대한민국 브랜드 플랫폼
</div>

<div class="hero">

<img src="images/hero1.png">

</div>

<div class="categories">

<a class="cat" href="k-food.html">
K-FOOD
</a>

</div>

<div class="footer">

© 2026 KING MAKE

</div>

</div>

</body>
</html>
