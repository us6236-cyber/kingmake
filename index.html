<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING MAKE</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:1000;
}
.nav-inner{
  max-width:1600px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
}
.logo{font-weight:700;letter-spacing:1px;font-size:18px}

/* LAYOUT */
.container{
  max-width:1600px;
  margin:auto;
  padding:140px 60px 80px;
  text-align:center;
}

/* HERO */
.hero-title{
  font-size:64px;
  letter-spacing:-1.5px;
  margin:0;
  animation:fadeUp 1.2s ease forwards;
}
.hero-sub{
  margin-top:20px;
  font-size:24px;
  opacity:0.85;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:translateY(0)}
}

/* 희소성 */
.scarcity{
  margin-top:28px;
  font-size:20px;
  color:#ffd700;
}

.pulse{
  animation:pulseText 1.2s infinite;
  font-weight:700;
}

@keyframes pulseText{
  0%{opacity:0.4}
  50%{opacity:1}
  100%{opacity:0.4}
}

/* 경쟁 문구 */
.competition{
  margin-top:20px;
  opacity:0.6;
  font-size:16px;
}

/* 버튼 */
.hero-buttons{margin-top:40px}

.btn{
  display:inline-block;
  margin:10px;
  padding:18px 46px;
  border-radius:40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.25s;
}
.btn.primary{
  background:#fff;
  color:#000;
}
.btn:hover{
  background:#fff;
  color:#000;
}

/* MAP */
.map{
  position:relative;
}
.map img{
  width:100%;
  max-width:1400px;
  margin-top:70px;
  border-radius:18px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
}

/* 왕좌 네온 */
.king-glow{
  position:absolute;
  top:25%;
  left:47%;
  width:6%;
  height:6%;
  border-radius:50%;
  box-shadow:
    0 0 15px #ffd700,
    0 0 30px #ffd700,
    0 0 60px rgba(255,215,0,0.6);
  animation:kingPulse 1.6s infinite;
}
@keyframes kingPulse{
  0%{transform:scale(0.9); opacity:0.6}
  50%{transform:scale(1.1); opacity:1}
  100%{transform:scale(0.9); opacity:0.6}
}

/* SECTION */
.section{margin-top:140px}
.section h1{font-size:40px;margin-bottom:20px}
.highlight{font-size:22px;opacity:0.85;line-height:1.8}

/* CARDS */
.card-wrap{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:50px;
}
.card{
  border:1px solid rgba(255,255,255,0.15);
  padding:40px;
  border-radius:18px;
  width:300px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-6px);
  border-color:rgba(255,255,255,0.4);
}

/* 로고 슬라이드 */
.logo-slider{
  margin-top:60px;
  overflow:hidden;
  white-space:nowrap;
}
.logo-track{
  display:inline-block;
  animation:scroll 18s linear infinite;
}
.logo-track img{
  height:40px;
  margin:0 30px;
  opacity:0.7;
}
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* FOOTER */
footer{
  margin-top:160px;
  text-align:center;
  opacity:0.4;
  font-size:13px;
}

/* MOBILE */
@media (max-width:768px){
  .container{padding:120px 20px 60px}
  .hero-title{font-size:36px}
  .hero-sub{font-size:18px}
  .section h1{font-size:28px}
  .highlight{font-size:18px}
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">
    <div class="logo">KING MAKE</div>
  </div>
</div>

<div class="container">

  <!-- HERO -->
  <h1 class="hero-title">
    왕좌에 오르는 순간,<br>
    브랜드는 달라집니다.
  </h1>

  <h2 class="hero-sub">
    선택은 당신의 브랜드입니다.
  </h2>

  <div class="scarcity">
    👑 KING 왕좌석 단 <span class="pulse">2자리</span>만 남았습니다
  </div>

  <div class="competition">
    경쟁은 이미 시작되었습니다.<br>
    왕좌는 선택된 브랜드만 차지합니다.
  </div>

  <div class="hero-buttons">
    <a class="btn primary" href="#seats">왕좌 위치 보기</a>
    <a class="btn" href="mailto:contact@kingmake.kr">상담 요청</a>
  </div>

  <!-- MAP -->
  <div class="map">
    <img src="images/hero.png">
    <div class="king-glow"></div>
  </div>

  <!-- LOGO SLIDER -->
  <div class="logo-slider">
    <div class="logo-track">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/KFC_logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/McDonald%27s_Golden_Arches.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/79/Starbucks_Logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Burger_King_2020.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/KFC_logo.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/McDonald%27s_Golden_Arches.svg">
    </div>
  </div>

  <!-- SEATS -->
  <div class="section" id="seats">
    <h1>좌석 개념</h1>
    <div class="card-wrap">
      <div class="card">👑 KING 왕좌<br>브랜드 1위 상징 자리</div>
      <div class="card">⭐ Premium<br>높은 주목도 위치</div>
      <div class="card">⬜ Standard<br>카테고리 참여 노출</div>
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="section">
    <h1>K-FOOD</h1>
    <div class="highlight">
      대한민국 대표 음식 브랜드가 모이는 자리<br>
      이곳에서 브랜드 경쟁이 시작됩니다.
    </div>
  </div>

  <footer>© 2026 KING MAKE</footer>

</div>

</body>
</html>
