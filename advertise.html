<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 신청 | KING MAKE</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #333;
}
button{
  cursor:pointer;
}
#result{
  margin-top:15px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>광고 좌석 신청</h2>

<input id="seatNo" placeholder="좌석번호 (예: P001)">
<select id="tier">
  <option value="premium">premium</option>
  <option value="standard">standard</option>
</select>

<input id="brandName" placeholder="브랜드명">
<input id="brandUrl" placeholder="브랜드 URL">

<input id="advertiserName" placeholder="광고주명">
<input id="depositorName" placeholder="입금자명">
<input id="managerPhone" placeholder="연락처">
<input id="managerEmail" placeholder="이메일">

<button onclick="reserveSeat()">좌석 신청</button>

<hr>

<h3>관리자 영역</h3>

<button onclick="confirmSeat()">입금 확인 → 광고 등록</button>
<button onclick="releaseSeat()">신청 해제</button>

<div id="result"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyPc9SCOE3Ubb5fLk9k6er7pTdcyQDEOakByKhGc4RmeNEP33ZiCCb7TTBW__ssHFsU/exec";

function log(msg){
  document.getElementById("result").innerText = msg;
}

// JSONP 핵심
function callJsonp(action, params = {}){
  return new Promise((resolve) => {

    const cb = "__cb_" + Math.random().toString(36).slice(2);

    window[cb] = (data) => {
      delete window[cb];
      script.remove();
      resolve(data);
    };

    const query = new URLSearchParams({
      action,
      cb,
      ...params,
      t: Date.now()
    });

    const script = document.createElement("script");
    script.src = API_URL + "?" + query.toString();

    script.onerror = () => {
      resolve({ ok:false, error:"연결 실패 (JSONP)" });
    };

    document.body.appendChild(script);
  });
}

// 좌석 신청
async function reserveSeat(){

  const data = {
    seatNo: document.getElementById("seatNo").value,
    tier: document.getElementById("tier").value,
    advertiserName: document.getElementById("advertiserName").value,
    managerPhone: document.getElementById("managerPhone").value,
    managerEmail: document.getElementById("managerEmail").value,
    depositorName: document.getElementById("depositorName").value
  };

  log("좌석 신청 중...");

  const res = await callJsonp("reserve_jsonp", data);

  if(res.ok){
    log("✅ 신청 완료\n좌석: " + data.seatNo);
  }else{
    log("❌ 실패\n" + res.error);
  }
}

// 관리자 승인
async function confirmSeat(){

  const pw = prompt("관리자 비밀번호");

  const data = {
    adminPassword: pw,
    seatNo: document.getElementById("seatNo").value,
    name: document.getElementById("brandName").value,
    url: document.getElementById("brandUrl").value,
    status:"LIVE"
  };

  log("승인 처리중...");

  const res = await callJsonp("confirm_jsonp", data);

  if(res.ok){
    log("✅ 광고 등록 완료");
  }else{
    log("❌ 실패\n" + res.error);
  }
}

// 신청 해제
async function releaseSeat(){

  const seatNo = document.getElementById("seatNo").value;

  log("해제 중...");

  const res = await callJsonp("release_jsonp", { seatNo });

  if(res.ok){
    log("✅ 해제 완료");
  }else{
    log("❌ 실패\n" + res.error);
  }
}
</script>

</body>
</html>
