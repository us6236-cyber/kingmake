<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 신청 | KING MAKE</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

.wrap{
  max-width:700px;
  margin:0 auto;
  padding:30px 20px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:8px;
  border:none;
  background:#222;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  background:#ff3b3b;
  border:none;
  color:#fff;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.notice{
  font-size:13px;
  color:#aaa;
  line-height:1.6;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#111;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="wrap">

<h1>광고 좌석 신청</h1>
<div class="sub">
대한민국 브랜드 지도<br>
클릭이 순위를 만듭니다 👑
</div>

<div class="card">

<label>좌석번호</label>
<input id="seatNo" placeholder="예: P001">

<label>등급</label>
<select id="tier">
  <option value="premium">premium</option>
  <option value="standard">standard</option>
</select>

<label>광고주명</label>
<input id="advertiserName">

<label>입금자명</label>
<input id="depositorName">

<label>연락처</label>
<input id="managerPhone">

<label>이메일</label>
<input id="managerEmail">

<button onclick="reserve()">좌석 신청하기</button>

</div>

<div class="card notice">
✔ 좌석 신청 후 계좌 입금 진행<br>
✔ 입금 확인 후 광고 LIVE 반영<br><br>

<strong>입금계좌</strong><br>
국민은행 000000-00-000000<br>
예금주: 수아산업
</div>

<div id="result" class="result">대기중...</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx2RbxlfkzrNcMA1bE8I3xnAYFbUmaMo1ISZvIhEF9G-BIDZz8R52ywjHqMlqlextoq/exec";

function reserve(){

  const seatNo = document.getElementById("seatNo").value.trim();
  const tier = document.getElementById("tier").value;
  const advertiserName = document.getElementById("advertiserName").value;
  const depositorName = document.getElementById("depositorName").value;
  const managerPhone = document.getElementById("managerPhone").value;
  const managerEmail = document.getElementById("managerEmail").value;

  if(!seatNo){
    alert("좌석번호 입력하세요");
    return;
  }

  document.getElementById("result").innerText = "신청 중...";

  const cb = "cb_"+Date.now();

  window[cb] = function(res){
    delete window[cb];

    if(res.ok){
      document.getElementById("result").innerText =
        "좌석 신청 완료\n\n" +
        "좌석: " + seatNo + "\n" +
        "입금자명: " + depositorName + "\n\n" +
        "위 계좌로 입금해 주세요.\n" +
        "입금 확인 후 광고가 등록됩니다.";
    }else{
      document.getElementById("result").innerText =
        "실패: " + res.error;
    }
  }

  const script = document.createElement("script");
  script.src =
    API_URL +
    "?action=reserve_jsonp" +
    "&cb=" + cb +
    "&seatNo=" + seatNo +
    "&tier=" + tier +
    "&advertiserName=" + advertiserName +
    "&depositorName=" + depositorName +
    "&managerPhone=" + managerPhone +
    "&managerEmail=" + managerEmail;

  document.body.appendChild(script);
}
</script>

</body>
</html>
