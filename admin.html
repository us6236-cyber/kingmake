<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 | KING MAKE</title>
  <style>
    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 18px 60px;
    }
    .card{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
    }
    .summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .box{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.03);
      border-radius:14px;
      padding:14px;
    }
    .label{
      font-size:12px;
      color:rgba(255,255,255,0.7);
      margin-bottom:6px;
    }
    .value{
      font-size:28px;
      font-weight:800;
    }
    input, button{
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(0,0,0,0.35);
      color:#fff;
      font-size:14px;
    }
    button{ cursor:pointer; }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
      font-size:14px;
    }
    th, td{
      border-bottom:1px solid rgba(255,255,255,0.08);
      padding:10px 8px;
      text-align:left;
    }
    th{
      color:rgba(255,255,255,0.7);
      font-size:12px;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    @media (max-width:700px){
      .summary{ grid-template-columns:1fr; }
      table{ font-size:12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>관리자 대시보드</h1>

    <div class="card">
      <div class="actions">
        <input id="adminPassword" type="password" placeholder="관리자 비밀번호">
        <button id="loadBtn" type="button">불러오기</button>
      </div>
    </div>

    <div class="card summary">
      <div class="box">
        <div class="label">OPEN</div>
        <div class="value" id="openCount">-</div>
      </div>
      <div class="box">
        <div class="label">RESERVED</div>
        <div class="value" id="reservedCount">-</div>
      </div>
      <div class="box">
        <div class="label">LIVE</div>
        <div class="value" id="liveCount">-</div>
      </div>
    </div>

    <div class="card">
      <div id="statusText">대기중...</div>
      <table>
        <thead>
          <tr>
            <th>좌석</th>
            <th>상태</th>
            <th>브랜드</th>
            <th>카테고리</th>
            <th>등급</th>
            <th>클릭</th>
            <th>광고주명</th>
            <th>연락처</th>
            <th>이메일</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwsqI78i_gzmpxEmejC716IwVHVF0xjxdAd7Gv3ph39TrgKZkN1waeyjCsMrz2kfgo3/exec";

    async function loadAdmin(){
      const password = document.getElementById("adminPassword").value.trim();
      if (!password) {
        document.getElementById("statusText").textContent = "관리자 비밀번호를 입력하세요.";
        return;
      }

      document.getElementById("statusText").textContent = "불러오는 중...";

      try{
        const res = await fetch(`${API_URL}?action=admin_json&password=${encodeURIComponent(password)}`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("statusText").textContent = data.error || "불러오기 실패";
          return;
        }

        document.getElementById("openCount").textContent = data.summary.open;
        document.getElementById("reservedCount").textContent = data.summary.reserved;
        document.getElementById("liveCount").textContent = data.summary.live;
        document.getElementById("statusText").textContent = "불러오기 완료";

        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        data.ads.forEach(item => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.seatNo || ""}</td>
            <td>${item.status || ""}</td>
            <td>${item.name || ""}</td>
            <td>${item.category || ""}</td>
            <td>${item.tier || ""}</td>
            <td>${item.clicks || 0}</td>
            <td>${item.advertiserName || ""}</td>
            <td>${item.managerPhone || ""}</td>
            <td>${item.managerEmail || ""}</td>
          `;
          tbody.appendChild(tr);
        });
      }catch(err){
        document.getElementById("statusText").textContent = "오류: " + String(err);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadAdmin);
  </script>
</body>
</html>
