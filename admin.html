<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | KING MAKE</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h1{margin-bottom:10px}

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #333;
}
button{cursor:pointer}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
.table th, .table td{
  border:1px solid #333;
  padding:8px;
  font-size:12px;
  text-align:center;
}

.live{color:#2ecc71}
.reserved{color:#f39c12}
.open{color:#aaa}
</style>
</head>

<body>

<h1>👑 KING ADMIN</h1>

<input id="password" placeholder="관리자 비밀번호">
<button onclick="loadAdmin()">데이터 불러오기</button>

<table class="table" id="table">
  <thead>
    <tr>
      <th>좌석</th>
      <th>상태</th>
      <th>브랜드</th>
      <th>카테고리</th>
      <th>클릭수</th>
      <th>광고주</th>
      <th>연락처</th>
      <th>이메일</th>
      <th>액션</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby-B6XTcdC0D_3YPRXVJrmq2dM5i4GfZRslbpWL8y4hrfe8HX_ZFZRrLT_Kk1hcaUtB/exec";

// JSONP
function callJsonp(action, params = {}){
  return new Promise((resolve) => {
    const cb = "__cb_" + Math.random().toString(36).slice(2);

    window[cb] = (data) => {
      delete window[cb];
      script.remove();
      resolve(data);
    };

    const query = new URLSearchParams({
      action,
      cb,
      ...params,
      t: Date.now()
    });

    const script = document.createElement("script");
    script.src = API_URL + "?" + query.toString();

    script.onerror = () => resolve({ ok:false, error:"JSONP 실패" });

    document.body.appendChild(script);
  });
}

// 데이터 불러오기
async function loadAdmin(){

  const password = document.getElementById("password").value;

  if(!password){
    alert("비밀번호 입력");
    return;
  }

  const res = await callJsonp("admin_json", { password });

  if(!res.ok){
    alert(res.error);
    return;
  }

  renderTable(res.ads);
}

// 테이블 렌더
function renderTable(list){

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  list.forEach(item => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.seatNo}</td>
      <td class="${item.status.toLowerCase()}">${item.status}</td>
      <td>${item.name || "-"}</td>
      <td>${item.category || "-"}</td>
      <td>${item.clicks}</td>
      <td>${item.advertiserName || "-"}</td>
      <td>${item.managerPhone || "-"}</td>
      <td>${item.managerEmail || "-"}</td>
      <td>
        ${item.status === "RESERVED" ? `<button onclick="confirm('${item.seatNo}')">승인</button>` : ""}
        ${item.status !== "LIVE" ? `<button onclick="release('${item.seatNo}')">해제</button>` : ""}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// 승인
async function confirm(seatNo){

  const password = document.getElementById("password").value;

  const name = prompt("브랜드명 입력");
  const url = prompt("브랜드 URL 입력");

  if(!name || !url){
    alert("브랜드 정보 필요");
    return;
  }

  const res = await callJsonp("confirm_jsonp", {
    adminPassword: password,
    seatNo,
    status:"LIVE",
    name,
    url
  });

  if(res.ok){
    alert("LIVE 처리 완료");
    loadAdmin();
  }else{
    alert(res.error);
  }
}

// 해제
async function release(seatNo){

  const res = await callJsonp("release_jsonp", { seatNo });

  if(res.ok){
    alert("해제 완료");
    loadAdmin();
  }else{
    alert(res.error);
  }
}
</script>

</body>
</html>
